">3</span>) - n0;\n<span class="kw">float</span> vx = dy / e, vy = -dx / e;  <span class="cm">// curl</span>'},ripples:{fn:"demo_ripples",code:'<span class="cm">/* 8 radial wave emitters with decay */</span>\n<span class="kw">for</span> (<span class="kw">int</span> i = <span class="nu">0</span>; i < <span class="nu">8</span>; i++) {\n    <span class="kw">float</span> r = <span class="fn">sqrtf</span>(dx*dx + dy*dy);\n    <span class="kw">float</span> age = t - drops[i].birth;\n    val += <span class="fn">cosf</span>(r*<span class="nu">0.3f</span> - age*<span class="nu">5</span>) *\n           <span class="fn">expf</span>(-age*<span class="nu">0.8f</span>) * <span class="fn">expf</span>(-r*<span class="nu">0.02f</span>);\n}'},gem:{fn:"demo_gem",code:'<span class="cm">/* 14-plane intersection → faceted gem */</span>\n<span class="kw">float</span> d = <span class="fn">gm_sd_sphere</span>(x, y, z, <span class="nu">1.1f</span>);\n<span class="kw">for</span> (<span class="kw">int</span> i = <span class="nu">0</span>; i < <span class="nu">14</span>; i++) {\n    <span class="kw">float</span> plane = x*n[i].x + y*n[i].y + z*n[i].z - n[i].w;\n    d = <span class="fn">fmaxf</span>(d, plane);  <span class="cm">// CSG intersection</span>\n}\n<span class="cm">/* + spectral dispersion via hue shift */</span>'},voronoi_growth:{fn:"demo_voronoi_growth",code:'<span class="cm">/* Voronoi edges glow with pulsating intensity */</span>\n<span class="kw">float</span> edge = <span class="fn">gm_voronoi_edge</span>(x, y);\n<span class="kw">float</span> glow = <span class="fn">expf</span>(-edge * <span class="nu">25</span>) *\n    (<span class="fn">sinf</span>(t*<span class="nu">3</span>)*<span class="nu">0.3f</span> + <span class="nu">0.7f</span>);'},snowflake:{fn:"demo_snowflake",code:'<span class="cm">/* 6-fold symmetry via angle folding */</span>\n<span class="kw">float</span> a = <span class="fn">atan2f</span>(y, x);\na = <span class="fn">gm_mod</span>(a, PI/<span class="nu">3</span>);\n<span class="kw">if</span> (a > PI/<span class="nu">6</span>) a = PI/<span class="nu">3</span> - a; <span class="cm">// mirror</span>\nx = r * <span class="fn">cosf</span>(a);\ny = r * <span class="fn">sinf</span>(a);\n<span class="cm">/* SDF branches in folded space */</span>'},gear:{fn:"demo_gear",code:'<span class="cm">/* Gear: radial cos modulation for teeth */</span>\n<span class="kw">float</span> tooth = <span class="fn">cosf</span>(a * <span class="nu">12</span>) * <span class="nu">0.12f</span>;\n<span class="kw">float</span> body = r - (<span class="nu">0.8f</span> + tooth);\n<span class="kw">float</span> hole = <span class="nu">0.18f</span> - r;\n<span class="kw">float</span> spoke = <span class="fn">fminf</span>(<span class="fn">fabsf</span>(<span class="fn">sinf</span>(a*<span class="nu">3</span>))*r, r-<span class="nu">0.2</span>);'},helix:{fn:"demo_helix",code:'<span class="cm">/* Thread helix: wind around cylinder */</span>\n<span class="kw">float</span> core = <span class="fn">gm_sd_cylinder</span>(x, y, z, <span class="nu">0.45f</span>, <span class="nu">1.5f</span>);\n<span class="kw">float</span> a = <span class="fn">atan2f</span>(x, z) + t * <span class="nu">0.5f</span>;\n<span class="kw">float</span> helixY = <span class="fn">gm_mod</span>(y + a*pitch/<span class="nu">TAU</span>, pitch);\n<span class="kw">float</span> helixR = <span class="fn">sqrtf</span>(x*x+z*z) - <span class="nu">0.6f</span>;\n<span class="kw">float</span> thread = <span class="fn">sqrtf</span>(helixR*helixR + helixY*helixY) - <span class="nu">0.12f</span>;'},pipes:{fn:"demo_pipes",code:'<span class="cm">/* 3 orthogonal cylinders, smooth-unioned */</span>\n<span class="kw">float</span> c1 = <span class="fn">gm_sd_cylinder</span>(x, y, z, <span class="nu">0.35f</span>, <span class="nu">2</span>);\n<span class="kw">float</span> c2 = <span class="fn">gm_sd_cylinder</span>(y, z, x, <span class="nu">0.35f</span>, <span class="nu">2</span>);\n<span class="kw">float</span> c3 = <span class="fn">gm_sd_cylinder</span>(z, x, y, <span class="nu">0.35f</span>, <span class="nu">2</span>);\nd = <span class="fn">gm_op_smooth_union</span>(c1, c2, <span class="nu">0.25f</span>);\nd = <span class="fn">gm_op_smooth_union</span>(d,  c3, <span class="nu">0.25f</span>);'},mandelbrot:{fn:"demo_mandelbrot",code:'<span class="cm">/* Mandelbrot: z = z² + c, 128 iterations */</span>\n<span class="kw">float</span> zr = <span class="nu">0</span>, zi = <span class="nu">0</span>;\n<span class="kw">for</span> (; i < <span class="nu">128</span>; i++) {\n    <span class="kw">if</span> (zr*zr + zi*zi > <span class="nu">256</span>) <span class="kw">break</span>;\n    zi = <span class="nu">2</span>*zr*zi + ci;\n    zr = zr*zr - zi*zi + cr;\n}\n<span class="cm">/* Smooth iteration count for continuous color */</span>\n<span class="kw">float</span> sm = i + <span class="nu">1</span> - <span class="fn">log2f</span>(<span class="fn">log2f</span>(zr*zr + zi*zi));'},julia:{fn:"demo_julia",code:'<span class="cm">/* Julia set: fixed c, varying z₀ */</span>\n<span class="kw">float</span> jcr = <span class="nu">-0.7269f</span> + <span class="fn">sinf</span>(t*<span class="nu">0.3</span>)*<span class="nu">0.15f</span>;\n<span class="kw">float</span> jci =  <span class="nu">0.1889f</span> + <span class="fn">cosf</span>(t*<span class="nu">0.23</span>)*<span class="nu">0.15f</span>;\n<span class="cm">/* Same iteration as Mandelbrot but c is fixed,\n   initial z comes from pixel coordinates */</span>'},gyroid:{fn:"demo_gyroid",code:'<span class="cm">/* Gyroid TPMS: sin(x)cos(y)+sin(y)cos(z)+sin(z)cos(x) */</span>\n<span class="kw">float</span> g = <span class="fn">sinf</span>(x*<span class="nu">2.5</span>)*<span class="fn">cosf</span>(y*<span class="nu">2.5</span>)\n        + <span class="fn">sinf</span>(y*<span class="nu">2.5</span>)*<span class="fn">cosf</span>(z*<span class="nu">2.5</span>)\n        + <span class="fn">sinf</span>(z*<span class="nu">2.5</span>)*<span class="fn">cosf</span>(x*<span class="nu">2.5</span>);\n<span class="kw">return</span> <span class="fn">fabsf</span>(g) / <span class="nu">2.5f</span> - <span class="nu">0.08f</span>;'},fog:{fn:"demo_fog",code:'<span class="cm">/* Volume ray march: 40 steps, FBM density */</span>\n<span class="kw">float</span> T = <span class="nu">1.0f</span>;  <span class="cm">// transmittance</span>\n<span class="kw">for</span> (<span class="kw">int</span> s = <span class="nu">0</span>; s < <span class="nu">40</span>; s++) {\n    <span class="kw">float</span> density = <span class="fn">gm_fbm3</span>(sx, sy, sz, <span class="nu">4</span>);\n    <span class="kw">float</span> absorption = <span class="fn">expf</span>(-dt * <span class="nu">2</span>);\n    color += T * (<span class="nu">1</span> - absorption) * fog_color;\n    T *= absorption;\n}'},aurora:{fn:"demo_aurora",code:'<span class="cm">/* 3 curtain layers: sine waves + noise */</span>\n<span class="kw">for</span> (<span class="kw">int</span> layer = <span class="nu">0</span>; layer < <span class="nu">3</span>; layer++) {\n    <span class="kw">float</span> wave = <span class="fn">sinf</span>(u*freq*PI + t*speed);\n    wave += <span class="fn">gm_noise2</span>(u*<span class="nu">4</span>, layer*<span class="nu">10</span>) * <span class="nu">0.08f</span>;\n    <span class="kw">float</span> curtain = <span class="fn">expf</span>(-dist*dist*<span class="nu">80</span>);\n    curtain *= ripple * height_fade;\n}'},lightning:{fn:"demo_lightning",code:'<span class="cm">/* Recursive midpoint bolt + branching */</span>\n<span class="fn">lightning_gen_bolt</span>(x0, y0, x1, y1, brightness, depth) {\n    <span class="kw">float</span> mx = (x0+x1)*<span class="nu">0.5</span> + random*<span class="nu">0.15</span>;\n    <span class="fn">lightning_gen_bolt</span>(x0,y0, mx,my, b, depth-<span class="nu">1</span>);\n    <span class="fn">lightning_gen_bolt</span>(mx,my, x1,y1, b, depth-<span class="nu">1</span>);\n    <span class="cm">/* Branch with probability at each split */</span>\n}\n<span class="cm">/* Per-pixel glow via segment SDF */</span>'},woven:{fn:"demo_woven",code:'<span class="cm">/* Warp/weft: alternating over-under pattern */</span>\n<span class="kw">int</span> over = ((ix + iy) & <span class="nu">1</span>) == <span class="nu">0</span>;\n<span class="kw">float</span> warpD = <span class="fn">fabsf</span>(fx) - <span class="nu">0.35f</span>;\n<span class="kw">float</span> weftD = <span class="fn">fabsf</span>(fy) - <span class="nu">0.35f</span>;\n<span class="kw">float</span> lift = over ? <span class="fn">sinf</span>(fy*PI)*<span class="nu">0.15</span>\n                  : -<span class="fn">sinf</span>(fx*PI)*<span class="nu">0.15</span>;'},moire:{fn:"demo_moire",code:'<span class="cm">/* Moiré: two rotated line grids multiplied */</span>\n<span class="kw">float</span> r1x = x*<span class="fn">cosf</span>(a1) - y*<span class="fn">sinf</span>(a1);\n<span class="kw">float</span> r2x = x*<span class="fn">cosf</span>(a2) - y*<span class="fn">sinf</span>(a2);\n<span class="kw">float</span> g1 = <span class="fn">sinf</span>(r1x*<span class="nu">1.5</span>)*<span class="nu">0.5</span> + <span class="nu">0.5</span>;\n<span class="kw">float</span> g2 = <span class="fn">sinf</span>(r2x*<span class="nu">1.5</span>)*<span class="nu">0.5</span> + <span class="nu">0.5</span>;\n<span class="kw">float</span> v = g1 * g2;  <span class="cm">// interference</span>'},chainmail:{fn:"demo_chainmail",code:'<span class="cm">/* Interlocked tori on a grid (alternating axis) */</span>\n<span class="kw">float</span> rx = <span class="fn">gm_op_repeat</span>(x, <span class="nu">1.0f</span>);\n<span class="kw">if</span> ((ix + iz) & <span class="nu">1</span>)\n    d = <span class="fn">gm_sd_torus</span>(rz, ry, rx, <span class="nu">0.32f</span>, <span class="nu">0.06f</span>);\n<span class="kw">else</span>\n    d = <span class="fn">gm_sd_torus</span>(rx, ry, rz, <span class="nu">0.32f</span>, <span class="nu">0.06f</span>);'},sdf_glow:{fn:"demo_sdf_glow",code:'<span class="cm">/* SDF text: segment-based letter SDFs */</span>\n<span class="kw">float</span> d = <span class="fn">letter_S</span>(x, y, <span class="nu">-1.2</span>);\nd = <span class="fn">fminf</span>(d, <span class="fn">letter_D</span>(x, y, <span class="nu">-0.3</span>));\nd = <span class="fn">fminf</span>(d, <span class="fn">letter_F</span>(x, y,  <span class="nu">0.6</span>));\nd -= <span class="nu">0.04f</span>;  <span class="cm">// thickness</span>\n<span class="kw">float</span> glow = <span class="fn">expf</span>(-d * <span class="nu">6</span>) * pulse;'},neon:{fn:"demo_neon",code:'<span class="cm">/* Neon: tube + exponential glow + flicker */</span>\n<span class="kw">float</span> flicker = <span class="nu">0.85</span> + <span class="nu">0.15</span>*<span class="fn">sinf</span>(t*<span class="nu">8</span> + x*<span class="nu">2</span>)\n             + <span class="nu">0.1</span>*<span class="fn">sinf</span>(t*<span class="nu">13</span> + y*<span class="nu">3</span>);\n<span class="kw">float</span> tube = <span class="fn">gm_smoothstep</span>(<span class="nu">0.06</span>, <span class="nu">0.03</span>, <span class="fn">fabsf</span>(d));\n<span class="kw">float</span> glow = <span class="fn">expf</span>(-<span class="fn">fabsf</span>(d)*<span class="nu">4</span>) * <span class="nu">0.5</span>;\n<span class="cm">/* + gm_bloom() post-process */</span>'},liquid_text:{fn:"demo_liquid_text",code:'<span class="cm">/* Liquid: letter SDF + orbiting blob smooth union */</span>\n<span class="kw">float</span> d = <span class="fn">letter_F</span>(...) | <span class="fn">letter_E</span>(...);\nd -= <span class="nu">0.06f</span>;  <span class="cm">// thickness</span>\n<span class="kw">for</span> (<span class="kw">int</span> i = <span class="nu">0</span>; i < <span class="nu">4</span>; i++) {\n    <span class="kw">float</span> bd = <span class="fn">gm_sd_circle</span>(x-bx, y-by, <span class="nu">0.15</span>);\n    d = <span class="fn">gm_op_smooth_union</span>(d, bd, <span class="nu">0.3f</span>);\n}'},galaxy_pts:{fn:"demo_galaxy_pts",code:'<span class="cm">/* 500 particles on 3 logarithmic spiral arms */</span>\n<span class="kw">float</span> angle = arm * <span class="nu">2.094f</span> + <span class="fn">logf</span>(r) * <span class="nu">2.5f</span>;\nsx[i] = r * <span class="fn">cosf</span>(angle) + scatter;\nsy[i] = r * <span class="fn">sinf</span>(angle) + scatter;\n<span class="cm">/* Rotate all particles each frame */</span>\nrx = sx[i]*<span class="fn">cosf</span>(rot) - sy[i]*<span class="fn">sinf</span>(rot);'},boids:{fn:"demo_boids",code:'<span class="cm">/* Craig Reynolds flocking: 3 rules */</span>\n<span class="cm">// Separation: avoid crowding neighbors</span>\nsep -= dx / dist;\n<span class="cm">// Alignment: steer toward avg heading</span>\nali += neighbor.velocity;\n<span class="cm">// Cohesion: steer toward avg position</span>\ncoh += neighbor.position;\n<span class="cm">/* Speed-limited, edge-wrapped */</span>'},smoke:{fn:"demo_smoke",code:'<span class="cm">/* Curl-noise advection: semi-Lagrangian */</span>\n<span class="kw">float</span> vx = -(<span class="fn">gm_noise2</span>(x, y+e) - <span class="fn">gm_noise2</span>(x, y-e));\n<span class="kw">float</span> vy =  (<span class="fn">gm_noise2</span>(x+e, y) - <span class="fn">gm_noise2</span>(x-e, y));\nvy -= <span class="nu">1.5f</span>;  <span class="cm">// buoyancy</span>\ndensity[py*W+px] = density[sy*W+sx] * <span class="nu">0.995f</span>;'},ct_slice:{fn:"demo_ct_slice",code:'<span class="cm">/* CT scan: concentric density rings + organs */</span>\nd += <span class="fn">gm_smoothstep</span>(<span class="nu">0.05</span>, <span class="nu">0</span>, <span class="fn">fabsf</span>(r-<span class="nu">0.85</span>)-<span class="nu">0.04</span>) * <span class="nu">0.55</span>;\n<span class="cm">/* Spine */</span>\n<span class="kw">float</span> spine = <span class="fn">sqrtf</span>(rx*rx + (ry+<span class="nu">0.3</span>)*(ry+<span class="nu">0.3</span>));\nd += <span class="fn">gm_smoothstep</span>(<span class="nu">0.15</span>, <span class="nu">0.05</span>, spine) * <span class="nu">0.6</span>;\n<span class="cm">/* + noise texture for tissue detail */</span>'},ecg:{fn:"demo_ecg",code:'<span class="cm">/* ECG: Gaussian peaks for P, QRS, T waves */</span>\n<span class="kw">float</span> p = <span class="nu">0.1</span> * <span class="fn">expf</span>(-(phase-<span class="nu">0.1</span>)²/<span class="nu">0.035</span>²);\n<span class="kw">float</span> r = <span class="nu">1.0</span> * <span class="fn">expf</span>(-(phase-<span class="nu">0.25</span>)²/<span class="nu">0.012</span>²);\n<span class="kw">float</span> t = <span class="nu">0.18</span> * <span class="fn">expf</span>(-(phase-<span class="nu">0.42</span>)²/<span class="nu">0.04</span>²);\necg = p + q + r + s + t;'},molecular:{fn:"demo_molecular",code:'<span class="cm">/* Water: 6 atoms (2 O + 4 H), smooth union */</span>\n<span class="kw">for</span> (<span class="kw">int</span> i = <span class="nu">0</span>; i < <span class="nu">6</span>; i++) {\n    <span class="kw">float</span> sd = <span class="fn">gm_sd_sphere</span>(x-ax, y-ay, z-az, r);\n    d = <span class="fn">gm_op_smooth_union</span>(d, sd, <span class="nu">0.3f</span>);\n}\n<span class="cm">/* Color by nearest atom: O=red, H=white */</span>'},marching_sq:{fn:"demo_marching_sq",code:'<span class="cm">/* Marching squares: 16-case edge table */</span>\n<span class="kw">int</span> idx = <span class="nu">0</span>;\n<span class="kw">if</span> (v0 > <span class="nu">0</span>) idx |= <span class="nu">1</span>;\n<span class="kw">if</span> (v1 > <span class="nu">0</span>) idx |= <span class="nu">2</span>;\n<span class="kw">if</span> (v2 > <span class="nu">0</span>) idx |= <span class="nu">4</span>;\n<span class="kw">if</span> (v3 > <span class="nu">0</span>) idx |= <span class="nu">8</span>;\n<span class="cm">/* Draw edge pairs from lookup table */</span>'},dungeon:{fn:"demo_dungeon",code:'<span class="cm">/* BSP tree splits space → rooms + corridors */</span>\n<span class="kw">void</span> <span class="fn">bsp_split</span>(x, y, w, h, depth) {\n    <span class="kw">if</span> (depth >= <span class="nu">4</span> || w < <span class="nu">60</span>) {\n        <span class="cm">/* leaf: place random room */</span>\n        rooms[count++] = {rx, ry, rw, rh};\n        <span class="kw">return</span>;\n    }\n    <span class="cm">/* split horiz or vert, recurse both halves */</span>\n    <span class="fn">bsp_split</span>(x, y, w, split, depth+<span class="nu">1</span>);\n}'},destruct:{fn:"demo_destruct",code:'<span class="cm">/* Terrain stored as heightmap, craters modify it */</span>\n<span class="kw">if</span> (<span class="fn">fabsf</span>(dx) < rad) {\n    <span class="kw">float</span> f = <span class="nu">1</span> - (dx*dx) / (rad*rad);\n    terrain[x] += f * depth;  <span class="cm">// parabolic crater</span>\n}\n<span class="cm">/* New crater every 0.6 seconds */</span>'},waveform:{fn:"demo_waveform",code:'<span class="cm">/* Additive synthesis: Σ sin(kx)/k */</span>\n<span class="kw">for</span> (<span class="kw">int</span> k = <span class="nu">1</span>; k <= harmonics; k++)\n    sum += <span class="fn">sinf</span>(phase * k) / k;\n<span class="cm">/* Harmonics count cycles 1..8 over time */</span>\n<span class="cm">/* Individual harmonics drawn dim, sum bright */</span>'},fft_butterfly:{fn:"demo_fft_butterfly",code:'<span class="cm">/* FFT butterfly diagram (N=16, 4 stages) */</span>\n<span class="kw">for</span> (<span class="kw">int</span> s = <span class="nu">0</span>; s < stages; s++) {\n    <span class="kw">int</span> group_size = <span class="nu">1</span> << (s + <span class="nu">1</span>);\n    <span class="cm">/* Draw straight + cross connections */</span>\n    <span class="cm">/* Animate: highlight current stage */</span>\n}'},convolution:{fn:"demo_convolution",code:'<span class="cm">/* Sliding kernel: Gaussian / derivative / box */</span>\n<span class="kw">for</span> (<span class="kw">int</span> j = <span class="nu">0</span>; j < ksize; j++) {\n    v += signal[i+j-ksize/<span class="nu">2</span>] * kernel[j];\n}\n<span class="cm">/* Input (blue) + output (yellow) + kernel highlight */</span>'},cnc:{fn:"demo_cnc",code:'<span class="cm">/* CNC: tool orbits star-shaped SDF contour */</span>\n<span class="kw">float</span> star = r - (<span class="nu">0.6</span> + <span class="fn">sinf</span>(a*<span class="nu">5</span>)*<span class="nu">0.15</span> + <span class="fn">sinf</span>(a*<span class="nu">3</span>)*<span class="nu">0.1</span>);\n<span class="kw">float</span> offset = star - toolR;  <span class="cm">// offset contour</span>\n<span class="kw">float</span> toolD = <span class="fn">sqrtf</span>(tdx*tdx+tdy*tdy) - toolR;'},slicing:{fn:"demo_slicing",code:'<span class="cm">/* 3D print slice: evaluate SDF at z=const */</span>\n<span class="kw">float</span> d = <span class="fn">slicing_scene</span>(x, y, zslice);\n<span class="kw">if</span> (d < <span class="nu">-0.05</span>) {\n    <span class="cm">/* Inside: gyroid infill pattern */</span>\n    infill = <span class="fn">sinf</span>(x*<span class="nu">30</span>)*<span class="fn">sinf</span>(y*<span class="nu">30</span>) > <span class="nu">0</span>;\n} <span class="kw">else if</span> (d < <span class="nu">0.05</span>) { <span class="cm">/* Shell */</span> }'},kerf:{fn:"demo_kerf",code:'<span class="cm">/* Laser kerf: SDF offset creates cut width */</span>\n<span class="kw">float</span> d = <span class="fn">kerf_shape</span>(x, y);\n<span class="kw">float</span> inner = d + k*<span class="nu">0.5</span>;  <span class="cm">// part boundary</span>\n<span class="kw">float</span> outer = d - k*<span class="nu">0.5</span>;  <span class="cm">// waste boundary</span>\n<span class="cm">/* k oscillates: k = 0.04 + sin(t)*0.02 */</span>\n<span class="cm">/* Kerf zone: heat glow + noise flicker */</span>'},galaxy_spiral:{fn:"demo_galaxy_spiral",code:'<span class="cm">/* Spir
