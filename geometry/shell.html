<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Geometry Is Math</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f0e0c;--bg-surface:#1a1815;--bg-elevated:#242119;--bg-code:#1e1c18;
  --text:#d4c8b0;--text-muted:#8a7e6a;--text-bright:#f0e8d8;
  --accent:#e6a756;--accent-dim:#c4853a;
  --blue:#5b9bd5;--cyan:#4ecdc4;--pink:#e06b8d;--green:#7ec97e;
  --red:#d45b5b;--purple:#a78bdb;
  --border:#2e2a24;--border-light:#3d3730;
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;display:flex;flex-direction:column}

/* ─── Header ─── */
header{background:var(--bg-surface);border-bottom:1px solid var(--border);padding:0 1.2rem;height:44px;display:flex;align-items:center;gap:1rem;flex-shrink:0}
.logo{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:15px;color:var(--text-bright);white-space:nowrap}
.logo span{color:var(--accent)}
.thesis{flex:1;font-size:12px;color:var(--text-muted);font-style:italic;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center}
.header-right{display:flex;align-items:center;gap:.8rem;flex-shrink:0}
.fps-display{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--green);min-width:52px}
.badge{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-muted);background:var(--bg-elevated);padding:2px 6px;border-radius:3px;border:1px solid var(--border)}

/* ─── Main layout: sidebar | canvas | right panel ─── */
.main{flex:1;display:flex;overflow:hidden}

/* ─── Category tabs (top bar) ─── */
.tab-bar{display:flex;gap:2px;padding:0 1rem;overflow-x:auto;background:var(--bg-surface);border-bottom:1px solid var(--border);flex-shrink:0;scrollbar-width:none}
.tab-bar::-webkit-scrollbar{display:none}
.tab{background:transparent;border:none;color:var(--text-muted);font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.04em;padding:.45rem .7rem;cursor:pointer;border-radius:6px 6px 0 0;transition:all .15s;white-space:nowrap}
.tab:hover{color:var(--text);background:var(--bg-elevated)}
.tab.active{color:var(--accent);background:var(--bg);border:1px solid var(--border);border-bottom-color:var(--bg);margin-bottom:-1px}

/* ─── Demo pills (below canvas) ─── */
.pill-strip{display:flex;gap:4px;padding:.4rem 1rem;overflow-x:auto;background:var(--bg-surface);border-top:1px solid var(--border);flex-shrink:0;scrollbar-width:none}
.pill-strip::-webkit-scrollbar{display:none}
.pill{background:var(--bg-elevated);border:1px solid var(--border);color:var(--text-muted);font-family:'JetBrains Mono',monospace;font-size:10px;padding:.25rem .6rem;border-radius:12px;cursor:pointer;white-space:nowrap;transition:all .15s;display:flex;align-items:center;gap:4px}
.pill:hover{color:var(--text);border-color:var(--border-light)}
.pill.active{color:var(--accent);border-color:var(--accent-dim);background:rgba(230,167,86,.1)}
.pill .dot{width:5px;height:5px;border-radius:50%;background:var(--green);flex-shrink:0}

/* ─── Canvas area ─── */
.canvas-area{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
.canvas-wrap{flex:1;display:flex;align-items:center;justify-content:center;background:#000;position:relative;overflow:hidden}
canvas{image-rendering:pixelated;image-rendering:crisp-edges;cursor:grab}
canvas:active{cursor:grabbing}

/* ─── Right panel: code + params ─── */
.right-panel{width:360px;flex-shrink:0;display:flex;flex-direction:column;background:var(--bg-code);border-left:1px solid var(--border);overflow:hidden}

/* params section */
.params{padding:10px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.params h3{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-muted);margin-bottom:8px;letter-spacing:.04em}
.param-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.param-row label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-muted);width:80px;flex-shrink:0}
.param-row input[type=range]{flex:1;height:4px;-webkit-appearance:none;appearance:none;background:var(--border);border-radius:2px;outline:none;cursor:pointer}
.param-row input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--accent);cursor:pointer}
.param-row input[type=range]::-moz-range-thumb{width:12px;height:12px;border-radius:50%;background:var(--accent);border:none;cursor:pointer}
.param-row .val{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--accent);width:36px;text-align:right;flex-shrink:0}
.param-row select{background:var(--bg-elevated);border:1px solid var(--border);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:10px;padding:3px 6px;border-radius:3px;cursor:pointer;flex:1}
.toggle-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.toggle-row label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-muted);width:80px;flex-shrink:0}
.toggle{position:relative;width:32px;height:16px;cursor:pointer;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.toggle .slider{position:absolute;inset:0;background:var(--border);border-radius:8px;transition:.2s}
.toggle .slider:before{content:"";position:absolute;width:12px;height:12px;left:2px;bottom:2px;background:var(--text-muted);border-radius:50%;transition:.2s}
.toggle input:checked + .slider{background:var(--accent-dim)}
.toggle input:checked + .slider:before{transform:translateX(16px);background:var(--accent)}

/* code section */
.code-section{flex:1;display:flex;flex-direction:column;overflow:hidden}
.code-header{background:var(--bg-surface);border-bottom:1px solid var(--border);padding:6px 14px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-muted);flex-shrink:0;display:flex;align-items:center;justify-content:space-between}
.code-header .demo-fn{color:var(--blue)}
.code-body{flex:1;overflow-y:auto;padding:10px 14px;scrollbar-width:thin;scrollbar-color:var(--border) var(--bg-code)}
.code-body::-webkit-scrollbar{width:5px}
.code-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.code-body pre{font-family:'JetBrains Mono',monospace;font-size:11px;line-height:1.55;color:var(--text);white-space:pre-wrap;word-break:break-word;tab-size:4}
.code-body .kw{color:var(--pink)}
.code-body .fn{color:var(--blue)}
.code-body .ty{color:var(--cyan)}
.code-body .cm{color:var(--text-muted);font-style:italic}
.code-body .nu{color:var(--accent)}
.code-body .st{color:var(--green)}

/* ─── Bottom bar ─── */
.bottom-bar{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-muted);padding:4px 1rem;background:var(--bg-surface);border-top:1px solid var(--border);flex-shrink:0;display:flex;justify-content:space-between}

/* ─── Responsive ─── */
@media(max-width:1100px){.right-panel{display:none}}
</style>
</head>
<body>
<header>
  <div class="logo">Geometry<span>IsMath</span></div>
  <div class="thesis" id="thesis"></div>
  <div class="header-right">
    <span class="fps-display" id="fps">-- FPS</span>
    <span class="badge" id="resBadge">640x400</span>
    <span class="badge" id="backend">loading</span>
  </div>
</header>
<div class="tab-bar" id="catTabs"></div>
<div class="main">
  <div class="canvas-area">
    <div class="canvas-wrap" id="canvasWrap"><canvas id="canvas"></canvas></div>
    <div class="pill-strip" id="pills"></div>
  </div>
  <div class="right-panel">
    <div class="params">
      <h3>PARAMETERS</h3>
      <div class="param-row">
        <label>Speed</label>
        <input type="range" id="speedSlider" min="0" max="300" value="100">
        <span class="val" id="speedVal">1.0x</span>
      </div>
      <div class="param-row">
        <label>Resolution</label>
        <select id="resSelect">
          <option value="320x200">320 x 200</option>
          <option value="480x300">480 x 300</option>
          <option value="640x400" selected>640 x 400</option>
          <option value="800x500">800 x 500</option>
        </select>
      </div>
      <div class="toggle-row">
        <label>Auto Rotate</label>
        <label class="toggle"><input type="checkbox" id="autoRotate"><span class="slider"></span></label>
      </div>
    </div>
    <div class="code-section">
      <div class="code-header">
        <span>C source</span>
        <span class="demo-fn" id="codeFn"></span>
      </div>
      <div class="code-body"><pre id="codeView"></pre></div>
    </div>
  </div>
</div>
<div class="bottom-bar">
  <span>drag: orbit &middot; arrows: navigate &middot; 1-9: category</span>
  <span>48 demos &middot; pure C math &middot; zero libraries</span>
</div>

<script>
/* ═══════════════════════════════════════════════════════════════════════════
 *  State
 * ═══════════════════════════════════════════════════════════════════════════ */
let curCat = 0, curItem = 0;
let mouseX = 0, mouseY = -0.3;
let dragging = false, lastDragX = 0, lastDragY = 0;
let W, H, bufferPtr;
let useWebGPU = false;
let mouseSens = 0.01;

/* WebGPU state */
let gpuDevice, gpuContext, gpuPipeline, gpuBindGroup, gpuTexture, gpuSampler;
let gpuFormat;

/* Canvas2D state */
let ctx2d;

/* FPS counter */
let frameCount = 0, lastFpsTime = 0;

/* ═══════════════════════════════════════════════════════════════════════════
 *  WASM init
 * ═══════════════════════════════════════════════════════════════════════════ */
var Module = {
  onRuntimeInitialized: function() {
    W = Module._get_width();
    H = Module._get_height();

<script>
/* ═══════════════════════════════════════════════════════════════════════════
 *  Sidebar
 * ═══════════════════════════════════════════════════════════════════════════ */
function buildTabs() {
  const bar = document.getElementById('catTabs');
  const numCats = Module._get_num_categories();
  bar.innerHTML = '';
  for (let c = 0; c < numCats; c++) {
    const label = UTF8ToString(Module._get_category_label(c));
    const btn = document.createElement('button');
    btn.className = 'tab' + (c === curCat ? ' active' : '');
    btn.textContent = label;
    btn.dataset.cat = c;
    btn.onclick = () => { selectDemo(c, 0); };
    bar.appendChild(btn);
  }
}

function buildPills() {
  const strip = document.getElementById('pills');
  const count = Module._get_category_count(curCat);
  strip.innerHTML = '';
  for (let i = 0; i < count; i++) {
    const title = UTF8ToString(Module._get_item_title(curCat, i));
    const pill = document.createElement('button');
    pill.className = 'pill' + (i === curItem ? ' active' : '');
    pill.innerHTML = `<span class="dot"></span>${title}`;
    pill.onclick = () => selectDemo(curCat, i);
    strip.appendChild(pill);
  }
}

function selectDemo(cat, item) {
  curCat = cat;
  curItem = item;
  mouseX = 0; mouseY = -0.3;
  Module._set_demo(curCat, curItem);
  Module._set_mouse(mouseX, mouseY);
  updateSelection();
}

function updateSelection() {
  /* Update tab highlights */
  document.querySelectorAll('.tab').forEach(t => {
    const c = parseInt(t.dataset.cat);
    t.className = 'tab' + (c === curCat ? ' active' : '');
  });

  /* Rebuild pills for current category */
  buildPills();

  /* Update thesis */
  const thesis = UTF8ToString(Module._get_category_thesis(curCat));
  document.getElementById('thesis').textContent = thesis;

  /* Update code panel */
  updateCode();
}

/* ═══════════════════════════════════════════════════════════════════════════
 *  Parameter controls
 * ═══════════════════════════════════════════════════════════════════════════ */
function initParams() {
  const speedSlider = document.getElementById('speedSlider');
  const speedVal = document.getElementById('speedVal');
  speedSlider.oninput = () => {
    const v = speedSlider.value / 100;
    Module._set_time_scale(v);
    speedVal.textContent = v.toFixed(1) + 'x';
  };

  const resSelect = document.getElementById('resSelect');
  resSelect.onchange = () => {
    const [w, h] = resSelect.value.split('x').map(Number);
    changeResolution(w, h);
  };

  const autoRotate = document.getElementById('autoRotate');
  autoRotate.onchange = () => {
    Module._set_auto_rotate(autoRotate.checked ? 1 : 0);
  };
}

async function changeResolution(newW, newH) {
  Module._set_resolution(newW, newH);
  W = Module._get_width();
  H = Module._get_height();
  bufferPtr = Module._get_buffer();
  document.getElementById('resBadge').textContent = W + 'x' + H;

  const canvas = document.getElementById('canvas');
  canvas.width = W;
  canvas.height = H;

  if (useWebGPU) {
    /* Recreate texture at new size */
    if (gpuTexture) gpuTexture.destroy();
    gpuTexture = gpuDevice.createTexture({
      size: [W, H],
      format: 'rgba8unorm',
      usage: GPUTextureUsage.TEXTURE_BINDING | GPUTextureUsage.COPY_DST
    });
    /* Recreate bind group with new texture view */
    const layout = gpuPipeline.getBindGroupLayout(0);
    gpuBindGroup = gpuDevice.createBindGroup({
      layout: layout,
      entries: [
        { binding: 0, resource: gpuSampler },
        { binding: 1, resource: gpuTexture.createView() }
      ]
    });
    /* Recreate shader + pipeline with new dimensions */
    await rebuildGPUPipeline();
  }

  fitCanvas();
}

<span class="kw">float</span> rz = <span class="fn">gm_op_repeat</span>(z, <span class="nu">3.0f</span>);

  lensing: {fn:'demo_lensing', code:`<span class="cm">/* Gravitational lensing: deflection ∝ 1/r */</span>
<span class="kw">float</span> deflect = einsteinR² / r;
<span class="kw">int</span> sx = px + nx * deflect;
<span class="kw">int</span> sy = py + ny * deflect;
<span class="cm">/* Sample background star field at deflected coords */</span>
<span class="cm">/* Einstein ring glow at r = einsteinR */</span>`},
  cosmic_web: {fn:'demo_cosmic_web', code:`<span class="cm">/* Cosmic web: voronoi filaments + galaxy clusters */</span>
<span class="kw">float</span> edge = <span class="fn">gm_voronoi_edge</span>(x, y);
<span class="kw">float</span> filament = <span class="fn">gm_smoothstep</span>(<span class="nu">0.15</span>, <span class="nu">0</span>, edge);
<span class="cm">/* Cluster glow at voronoi cell centers */</span>
cluster += <span class="fn">expf</span>(-d * <span class="nu">8</span>) * <span class="nu">0.5</span>;`},
};

function updateCode() {
  const id = UTF8ToString(Module._get_item_id(curCat, curItem));
  const title = UTF8ToString(Module._get_item_title(curCat, curItem));
  const entry = CODE[id];
  if (entry) {
    document.getElementById('codeFn').textContent = entry.fn + '()';
    document.getElementById('codeView').innerHTML = entry.code;
  } else {
    document.getElementById('codeFn').textContent = id;
    document.getElementById('codeView').innerHTML = `<span class="cm">/* ${title} */</span>`;
  }
}

/* ═══════════════════════════════════════════════════════════════════════════
 *  Input
 * ═══════════════════════════════════════════════════════════════════════════ */
const canvas = document.getElementById('canvas');

canvas.addEventListener('mousedown', (e) => {
  dragging = true;
  lastDragX = e.clientX;
  lastDragY = e.clientY;
});
window.addEventListener('mousemove', (e) => {
  if (!dragging) return;
  mouseX += (e.clientX - lastDragX) * mouseSens;
  mouseY = Math.max(-1.2, Math.min(0.5, mouseY + (e.clientY - lastDragY) * mouseSens));
  lastDragX = e.clientX;
  lastDragY = e.clientY;
  Module._set_mouse(mouseX, mouseY);
});
window.addEventListener('mouseup', () => { dragging = false; });

canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  dragging = true;
  lastDragX = e.touches[0].clientX;
  lastDragY = e.touches[0].clientY;
}, {passive: false});
canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if (!dragging) return;
  mouseX += (e.touches[0].clientX - lastDragX) * mouseSens;
  mouseY = Math.max(-1.2, Math.min(0.5, mouseY + (e.touches[0].clientY - lastDragY) * mouseSens));
  lastDragX = e.touches[0].clientX;
  lastDragY = e.touches[0].clientY;
  Module._set_mouse(mouseX, mouseY);
}, {passive: false});
canvas.addEventListener('touchend', () => { dragging = false; });

document.addEventListener('keydown', (e) => {
  const numCats = Module._get_num_categories();
  const catCount = Module._get_category_count(curCat);

  if (e.key === 'ArrowRight') {
    selectDemo(curCat, (curItem + 1) % catCount);
  } else if (e.key === 'ArrowLeft') {
    selectDemo(curCat, (curItem - 1 + catCount) % catCount);
  } else if (e.key === 'ArrowDown' || e.key === 'Tab') {
    e.preventDefault();
    selectDemo((curCat + 1) % numCats, 0);
  } else if (e.key === 'ArrowUp') {
    selectDemo((curCat - 1 + numCats) % numCats, 0);
  } else if (e.key >= '1' && e.key <= '9') {
    const idx = parseInt(e.key) - 1;
    if (idx < numCats) selectDemo(idx, 0);
  }
});

/* ═══════════════════════════════════════════════════════════════════════════
 *  Renderer
 * ═══════════════════════════════════════════════════════════════════════════ */
async function initRenderer() {
  canvas.width = W;
  canvas.height = H;
  fitCanvas();
  window.addEventListener('resize', fitCanvas);

  if (await tryWebGPU()) {
    useWebGPU = true;
    document.getElementById('backend').textContent = 'WebGPU';
    requestAnimationFrame(frameWebGPU);
  } else {
    ctx2d = canvas.getContext('2d');
    document.getElementById('backend').textContent = 'Canvas2D';
    requestAnimationFrame(frameCanvas2D);
  }
}

function fitCanvas() {
  const wrap = document.getElementById('canvasWrap');
  const ww = wrap.clientWidth, wh = wrap.clientHeight;
  /* Fill the container, maintaining aspect ratio */
  const scale = Math.min(ww / W, wh / H);
  canvas.style.width = Math.round(W * scale) + 'px';
  canvas.style.height = Math.round(H * scale) + 'px';
}

/* ═══════════════════════════════════════════════════════════════════════════
 *  WebGPU
 * ═══════════════════════════════════════════════════════════════════════════ */
async function tryWebGPU() {
  if (!navigator.gpu) return false;
  try {
    const adapter = await navigator.gpu.requestAdapter();
    if (!adapter) return false;
    gpuDevice = await adapter.requestDevice();

    gpuContext = canvas.getContext('webgpu');
    gpuFormat = navigator.gpu.getPreferredCanvasFormat();
    gpuContext.configure({ device: gpuDevice, format: gpuFormat, alphaMode: 'opaque' });

    gpuTexture = gpuDevice.createTexture({
      size: [W, H],
      format: 'rgba8unorm',
      usage: GPUTextureUsage.TEXTURE_BINDING | GPUTextureUsage.COPY_DST
    });

    gpuSampler = gpuDevice.createSampler({ magFilter: 'nearest', minFilter: 'nearest' });

    await rebuildGPUPipeline();
    return true;
  } catch (e) {
    console.warn('WebGPU init failed:', e);
    return false;
  }
}

async function rebuildGPUPipeline() {
  const needSwizzle = (gpuFormat === 'bgra8unorm');
  const shaderCode = `
@vertex fn vs(@builtin(vertex_index) i: u32) -> @builtin(position) vec4f {
  let x = f32(i32(i & 1u)) * 4.0 - 1.0;
  let y = f32(i32(i >> 1u)) * 4.0 - 1.0;
  return vec4f(x, -y, 0, 1);
}
@group(0) @binding(0) var samp: sampler;
@group(0) @binding(1) var tex: texture_2d<f32>;
@fragment fn fs(@builtin(position) pos: vec4f) -> @location(0) vec4f {
  let uv = pos.xy / vec2f(${W}.0, ${H}.0);
  let c = textureSample(tex, samp, uv);
  ${needSwizzle ? 'return vec4f(c.b, c.g, c.r, c.a);' : 'return c;'}
}`;
  const shaderModule = gpuDevice.createShaderModule({ code: shaderCode });

  const bindGroupLayout = gpuDevice.createBindGroupLayout({
    entries: [
      { binding: 0, visibility: GPUShaderStage.FRAGMENT, sampler: {} },
      { binding: 1, visibility: GPUShaderStage.FRAGMENT, texture: {} }
    ]
  });

  gpuPipeline = gpuDevice.createRenderPipeline({
    layout: gpuDevice.createPipelineLayout({ bindGroupLayouts: [bindGroupLayout] }),
    vertex: { module: shaderModule, entryPoint: 'vs' },
    fragment: { module: shaderModule, entryPoint: 'fs', targets: [{ format: gpuFormat }] },
    primitive: { topology: 'triangle-list' }
  });

  gpuBindGroup = gpuDevice.createBindGroup({
    layout: bindGroupLayout,
    entries: [
      { binding: 0, resource: gpuSampler },
      { binding: 1, resource: gpuTexture.createView() }
    ]
  });
}

/* ═══════════════════════════════════════════════════════════════════════════
 *  Frame loops
 * ═══════════════════════════════════════════════════════════════════════════ */
function updateFPS(now) {
  frameCount++;
  if (now - lastFpsTime >= 1000) {
    document.getElementById('fps').textContent = frameCount + ' FPS';
    frameCount = 0;
    lastFpsTime = now;
  }
}

function frameWebGPU(now) {
  Module._render_frame(now / 1000);
  const buf = new Uint8Array(Module.HEAPU8.buffer, bufferPtr, W * H * 4);
  gpuDevice.queue.writeTexture({ texture: gpuTexture }, buf, { bytesPerRow: W * 4 }, { width: W, height: H });

  const encoder = gpuDevice.createCommandEncoder();
  const pass = encoder.beginRenderPass({
    colorAttachments: [{ view: gpuContext.getCurrentTexture().createView(), loadOp: 'clear', clearValue: {r:0,g:0,b:0,a:1}, storeOp: 'store' }]
  });
  pass.setPipeline(gpuPipeline);
  pass.setBindGroup(0, gpuBindGroup);
  pass.draw(3);
  pass.end();
  gpuDevice.queue.submit([encoder.finish()]);
  updateFPS(now);
  requestAnimationFrame(frameWebGPU);
}

function frameCanvas2D(now) {
  Module._render_frame(now / 1000);
  const buf = new Uint8ClampedArray(Module.HEAPU8.buffer, bufferPtr, W * H * 4);
  ctx2d.putImageData(new ImageData(buf, W, H), 0, 0);
  updateFPS(now);
  requestAnimationFrame(frameCanvas2D);
}
