<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Geometry Is Math</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f0e0c;--bg-surface:#1a1815;--bg-elevated:#242119;--bg-code:#1e1c18;
  --text:#d4c8b0;--text-muted:#8a7e6a;--text-bright:#f0e8d8;
  --accent:#e6a756;--accent-dim:#c4853a;
  --blue:#5b9bd5;--cyan:#4ecdc4;--pink:#e06b8d;--green:#7ec97e;
  --red:#d45b5b;--purple:#a78bdb;
  --border:#2e2a24;--border-light:#3d3730;
}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;height:100vh;overflow:hidden;display:flex;flex-direction:column}
header{background:var(--bg-surface);border-bottom:1px solid var(--border);padding:0 1.5rem;height:48px;display:flex;align-items:center;gap:1rem;flex-shrink:0}
.logo{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:15px;color:var(--text-bright);white-space:nowrap}
.logo span{color:var(--accent)}
.tabs{display:flex;gap:2px;overflow-x:auto;flex:1;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{background:transparent;border:none;color:var(--text-muted);font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.04em;padding:.4rem .7rem;cursor:pointer;border-radius:6px 6px 0 0;transition:all .15s;white-space:nowrap}
.tab:hover{color:var(--text);background:var(--bg-elevated)}
.tab.active{color:var(--accent);background:var(--bg);border:1px solid var(--border);border-bottom-color:var(--bg);margin-bottom:-1px}
.header-right{margin-left:auto;display:flex;align-items:center;gap:1rem;flex-shrink:0}
.fps-display{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--green)}
.btn{background:var(--bg-elevated);border:1px solid var(--border);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:11px;padding:.35rem .8rem;border-radius:4px;cursor:pointer;transition:all .15s}
.btn:hover{border-color:var(--accent-dim);color:var(--accent)}
.main{flex:1;display:flex;overflow:hidden}
.canvas-panel{flex:1;display:flex;flex-direction:column;border-right:1px solid var(--border);min-width:0}
.thesis{padding:.5rem 1.2rem;font-size:12px;color:var(--text-muted);font-style:italic;background:var(--bg-surface);border-bottom:1px solid var(--border);flex-shrink:0;min-height:32px;display:flex;align-items:center}
.canvas-wrap{flex:1;display:flex;align-items:center;justify-content:center;background:#000;position:relative;overflow:hidden}
canvas{image-rendering:pixelated;image-rendering:crisp-edges}
.pill-strip{display:flex;gap:4px;padding:.5rem 1rem;overflow-x:auto;background:var(--bg-surface);border-top:1px solid var(--border);flex-shrink:0;scrollbar-width:none}
.pill-strip::-webkit-scrollbar{display:none}
.pill{background:var(--bg-elevated);border:1px solid var(--border);color:var(--text-muted);font-family:'JetBrains Mono',monospace;font-size:10px;padding:.25rem .6rem;border-radius:12px;cursor:pointer;white-space:nowrap;transition:all .15s;display:flex;align-items:center;gap:4px}
.pill:hover{color:var(--text);border-color:var(--border-light)}
.pill.active{color:var(--accent);border-color:var(--accent-dim);background:rgba(230,167,86,.1)}
.pill .dot{width:5px;height:5px;border-radius:50%;background:var(--green);flex-shrink:0}
.code-panel{width:440px;flex-shrink:0;display:flex;flex-direction:column;background:var(--bg-code);overflow:hidden}
.note-area{padding:1rem;border-bottom:1px solid var(--border);flex-shrink:0;max-height:40%;overflow-y:auto}
.item-title{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:600;color:var(--text-bright);margin-bottom:.5rem}
.item-note{font-size:13px;line-height:1.6;color:var(--text)}
.code-header{background:var(--bg-surface);border-bottom:1px solid var(--border);padding:.5rem 1rem;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-muted);flex-shrink:0;display:flex;align-items:center;justify-content:space-between}
.code-tabs{display:flex;gap:2px}
.code-tab{background:transparent;border:none;color:var(--text-muted);font-family:'JetBrains Mono',monospace;font-size:11px;padding:.3rem .6rem;cursor:pointer;border-radius:3px;transition:all .15s}
.code-tab:hover{color:var(--text)}
.code-tab.active{color:var(--accent);background:var(--bg-code)}
#jsEditor{width:100%;height:100%;resize:none;background:var(--bg-code);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.6;border:none;outline:none;padding:1rem;tab-size:2;white-space:pre}
.btn-run{background:var(--green);color:var(--bg);border:none;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;padding:.3rem .8rem;border-radius:3px;cursor:pointer}
.btn-run:hover{opacity:.85}
.run-error{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--red);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.code-body{flex:1;overflow-y:auto;padding:1rem}
.code-body pre{font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.6;color:var(--text);white-space:pre;tab-size:4}
.code-body .kw{color:var(--pink)}
.code-body .fn{color:var(--blue)}
.code-body .ty{color:var(--cyan)}
.code-body .cm{color:var(--text-muted);font-style:italic}
.code-body .st{color:var(--green)}
.code-body .nu{color:var(--accent)}
.code-body::-webkit-scrollbar{width:6px}
.code-body::-webkit-scrollbar-track{background:var(--bg-code)}
.code-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
@media(max-width:900px){.code-panel{display:none}}
</style>
</head>
<body>
<header>
  <div class="logo">Geometry<span>IsMath</span></div>
  <div class="tabs" id="catTabs"></div>
  <div class="header-right">
    <span class="fps-display" id="fps">60 FPS</span>
    <button class="btn" id="pauseBtn">Pause</button>
  </div>
</header>
<div class="main">
  <div class="canvas-panel">
    <div class="thesis" id="thesis"></div>
    <div class="canvas-wrap"><canvas id="canvas"></canvas></div>
    <div class="pill-strip" id="pills"></div>
  </div>
  <div class="code-panel">
    <div class="note-area"><div class="item-title" id="itemTitle"></div><div class="item-note" id="itemNote"></div></div>
    <div class="code-header">
      <div class="code-tabs">
        <button class="code-tab active" id="cTabBtn">GLSL concept</button>
        <button class="code-tab" id="jsTabBtn">JS live</button>
      </div>
      <div style="display:flex;gap:0.5rem;align-items:center">
        <span class="run-error" id="runError"></span>
        <button class="btn" id="resetCodeBtn" style="display:none">Revert</button>
        <button class="btn-run" id="runBtn" style="display:none">Run</button>
      </div>
    </div>
    <div class="code-body" id="codeBodyC"><pre id="codeView"></pre></div>
    <div class="code-body" id="codeBodyJS" style="display:none">
      <textarea id="jsEditor" spellcheck="false"></textarea>
    </div>
  </div>
</div>
<script>
// ═══════════════════════════════════════════════════════════════
//  Geometry Is Math — Interactive Deep-Dive
// ═══════════════════════════════════════════════════════════════

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const W = 320, H = 200;
canvas.width = W; canvas.height = H;
const imageData = ctx.createImageData(W, H);
const pixels = imageData.data;
let paused = false, currentCat = null, currentItem = null;
let mouseX = 0, mouseY = -0.3, dragging = false;
let startTime = performance.now(), frameCount = 0, lastFpsTime = startTime;

function setPixel(x, y, r, g, b) {
  if ((x |= 0) < 0 || x >= W || (y |= 0) < 0 || y >= H) return;
  const i = (y * W + x) << 2;
  pixels[i] = r < 0 ? 0 : r > 255 ? 255 : r;
  pixels[i+1] = g < 0 ? 0 : g > 255 ? 255 : g;
  pixels[i+2] = b < 0 ? 0 : b > 255 ? 255 : b;
  pixels[i+3] = 255;
}

function clear(r, g, b) {
  for (let i = 0; i < pixels.length; i += 4) {
    pixels[i] = r; pixels[i+1] = g; pixels[i+2] = b; pixels[i+3] = 255;
  }
}

// ═══ MATH LIBRARY ═══

function ihash(x, y) {
  x = x | 0; y = y | 0;
  let n = Math.imul(x, 1597334677) ^ Math.imul(y, 3812015801);
  n = Math.imul(n ^ (n >>> 16), 0x45d9f3b);
  n = Math.imul(n ^ (n >>> 16), 0x45d9f3b);
  return ((n ^ (n >>> 16)) >>> 0) / 4294967295;
}

function noise2(x, y) {
  const ix = Math.floor(x), iy = Math.floor(y);
  const fx = x - ix, fy = y - iy;
  const ux = fx * fx * (3 - 2 * fx), uy = fy * fy * (3 - 2 * fy);
  const a = ihash(ix, iy), b = ihash(ix+1, iy);
  const c = ihash(ix, iy+1), d = ihash(ix+1, iy+1);
  return (a + (b-a)*ux + (c-a)*uy + (a-b-c+d)*ux*uy) * 2 - 1;
}

function noise3(x, y, z) {
  const ix = Math.floor(x), iy = Math.floor(y), iz = Math.floor(z);
  const fx = x-ix, fy = y-iy, fz = z-iz;
  const ux = fx*fx*(3-2*fx), uy = fy*fy*(3-2*fy), uz = fz*fz*(3-2*fz);
  const n000 = ihash(ix+iz*137, iy), n100 = ihash(ix+1+iz*137, iy);
  const n010 = ihash(ix+iz*137, iy+1), n110 = ihash(ix+1+iz*137, iy+1);
  const n001 = ihash(ix+(iz+1)*137, iy), n101 = ihash(ix+1+(iz+1)*137, iy);
  const n011 = ihash(ix+(iz+1)*137, iy+1), n111 = ihash(ix+1+(iz+1)*137, iy+1);
  const n00 = n000+(n100-n000)*ux, n10 = n010+(n110-n010)*ux;
  const n01 = n001+(n101-n001)*ux, n11 = n011+(n111-n011)*ux;
  const n0 = n00+(n10-n00)*uy, n1 = n01+(n11-n01)*uy;
  return (n0+(n1-n0)*uz)*2-1;
}

function fbm(x, y, oct) {
  let v = 0, amp = 0.5, freq = 1;
  for (let i = 0; i < oct; i++) { v += noise2(x*freq, y*freq)*amp; freq *= 2; amp *= 0.5; }
  return v;
}

function fbm3(x, y, z, oct) {
  let v = 0, amp = 0.5, freq = 1;
  for (let i = 0; i < oct; i++) { v += noise3(x*freq, y*freq, z*freq)*amp; freq *= 2; amp *= 0.5; }
  return v;
}

function voronoi(x, y) {
  const ix = Math.floor(x), iy = Math.floor(y);
  let md = 999, mid = 0;
  for (let dy = -1; dy <= 1; dy++) for (let dx = -1; dx <= 1; dx++) {
    const cx = ix+dx, cy = iy+dy;
    const px = cx + ihash(cx, cy), py = cy + ihash(cx+100, cy+100);
    const d = (x-px)*(x-px) + (y-py)*(y-py);
    if (d < md) { md = d; mid = ihash(cx+200, cy+200); }
  }
  return [Math.sqrt(md), mid];
}

function voronoiEdge(x, y) {
  const ix = Math.floor(x), iy = Math.floor(y);
  let md = 999, md2 = 999;
  for (let dy = -1; dy <= 1; dy++) for (let dx = -1; dx <= 1; dx++) {
    const cx = ix+dx, cy = iy+dy;
    const px = cx + ihash(cx, cy), py = cy + ihash(cx+100, cy+100);
    const d = (x-px)*(x-px)+(y-py)*(y-py);
    if (d < md) { md2 = md; md = d; } else if (d < md2) { md2 = d; }
  }
  return Math.sqrt(md2) - Math.sqrt(md);
}

// 2D SDFs
function sdCircle(px, py, r) { return Math.sqrt(px*px+py*py)-r; }
function sdBox2(px, py, bx, by) {
  const dx = Math.abs(px)-bx, dy = Math.abs(py)-by;
  return Math.sqrt(Math.max(dx,0)**2+Math.max(dy,0)**2)+Math.min(Math.max(dx,dy),0);
}
function sdSegment(px, py, ax, ay, bx, by) {
  const bax=bx-ax, bay=by-ay, pax=px-ax, pay=py-ay;
  const h = Math.max(0, Math.min(1, (pax*bax+pay*bay)/(bax*bax+bay*bay)));
  const dx=pax-bax*h, dy=pay-bay*h;
  return Math.sqrt(dx*dx+dy*dy);
}

// 3D SDFs
function sdSphere(px,py,pz,r) { return Math.sqrt(px*px+py*py+pz*pz)-r; }
function sdTorus(px,py,pz,R,r) { const q=Math.sqrt(px*px+pz*pz)-R; return Math.sqrt(q*q+py*py)-r; }
function sdBox3(px,py,pz,bx,by,bz) {
  const dx=Math.abs(px)-bx, dy=Math.abs(py)-by, dz=Math.abs(pz)-bz;
  return Math.sqrt(Math.max(dx,0)**2+Math.max(dy,0)**2+Math.max(dz,0)**2)+Math.min(Math.max(dx,dy,dz),0);
}
function sdCylinder(px,py,pz,r,h) {
  const d=Math.sqrt(px*px+pz*pz)-r, dy=Math.abs(py)-h;
  return Math.min(Math.max(d,dy),0)+Math.sqrt(Math.max(d,0)**2+Math.max(dy,0)**2);
}
function sdPlane(py,h) { return py-h; }

// Ops
function opUnion(a,b) { return Math.min(a,b); }
function opSmoothUnion(d1,d2,k) {
  const h = Math.max(k-Math.abs(d1-d2),0)/k;
  return Math.min(d1,d2)-h*h*k*0.25;
}
function opSubtract(d1,d2) { return Math.max(-d1,d2); }
function opIntersect(d1,d2) { return Math.max(d1,d2); }
function opRepeat(p,s) { return ((p%s)+s)%s-s*0.5; }

// Color
function hue(h) {
  h = h-Math.floor(h); const f=h*6, i=Math.floor(f)%6, fr=f-Math.floor(f);
  let r,g,b;
  switch(i){
    case 0:r=1;g=fr;b=0;break;case 1:r=1-fr;g=1;b=0;break;case 2:r=0;g=1;b=fr;break;
    case 3:r=0;g=1-fr;b=1;break;case 4:r=fr;g=0;b=1;break;default:r=1;g=0;b=1-fr;
  }
  return [(r*255)|0,(g*255)|0,(b*255)|0];
}
function lerp(a,b,t) { return a+(b-a)*t; }
function clamp(x,lo,hi) { return x<lo?lo:x>hi?hi:x; }
function smoothstep(a,b,x) { const t=clamp((x-a)/(b-a),0,1); return t*t*(3-2*t); }

// ═══ BITMAP FONT + ANNOTATIONS ═══

const DIGITS = [
  [0x1F,0x11,0x11,0x11,0x1F],[0x04,0x0C,0x04,0x04,0x0E],[0x1F,0x01,0x1F,0x10,0x1F],
  [0x1F,0x01,0x1F,0x01,0x1F],[0x11,0x11,0x1F,0x01,0x01],[0x1F,0x10,0x1F,0x01,0x1F],
  [0x1F,0x10,0x1F,0x11,0x1F],[0x1F,0x01,0x02,0x04,0x04],[0x1F,0x11,0x1F,0x11,0x1F],
  [0x1F,0x11,0x1F,0x01,0x1F],
];
const LETTERS = {
  'S':[0x1F,0x10,0x1F,0x01,0x1F],'C':[0x1F,0x10,0x10,0x10,0x1F],
  'O':[0x1F,0x11,0x11,0x11,0x1F],'R':[0x1F,0x11,0x1F,0x14,0x12],
  'E':[0x1F,0x10,0x1E,0x10,0x1F],'G':[0x1F,0x10,0x17,0x11,0x1F],
  'A':[0x0E,0x11,0x1F,0x11,0x11],'M':[0x11,0x1B,0x15,0x11,0x11],
  'V':[0x11,0x11,0x11,0x0A,0x04],'D':[0x1E,0x11,0x11,0x11,0x1E],
  'P':[0x1F,0x11,0x1F,0x10,0x10],'W':[0x11,0x11,0x15,0x1B,0x11],
  'T':[0x1F,0x04,0x04,0x04,0x04],'I':[0x0E,0x04,0x04,0x04,0x0E],
  'N':[0x11,0x19,0x15,0x13,0x11],'K':[0x11,0x12,0x1C,0x12,0x11],
  'Y':[0x11,0x0A,0x04,0x04,0x04],'F':[0x1F,0x10,0x1E,0x10,0x10],
  'H':[0x11,0x11,0x1F,0x11,0x11],'L':[0x10,0x10,0x10,0x10,0x1F],
  ' ':[0x00,0x00,0x00,0x00,0x00],'X':[0x11,0x0A,0x04,0x0A,0x11],
  'U':[0x11,0x11,0x11,0x11,0x1F],'B':[0x1E,0x11,0x1E,0x11,0x1E],
  'J':[0x01,0x01,0x01,0x11,0x0E],'Q':[0x0E,0x11,0x11,0x15,0x0E],
  'Z':[0x1F,0x02,0x04,0x08,0x1F],
  '.':[0x00,0x00,0x00,0x00,0x04],':':[0x00,0x04,0x00,0x04,0x00],
  '=':[0x00,0x1F,0x00,0x1F,0x00],'-':[0x00,0x00,0x1F,0x00,0x00],
  '+':[0x00,0x04,0x1F,0x04,0x00],'(':[0x02,0x04,0x04,0x04,0x02],
  ')':[0x08,0x04,0x04,0x04,0x08],
};

function drawText(cx, cy, text, r, g, b, scale) {
  scale = scale || 1;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i].toUpperCase();
    const glyph = LETTERS[ch] || DIGITS[parseInt(ch)];
    if (!glyph) continue;
    for (let row = 0; row < 5; row++)
      for (let col = 0; col < 5; col++)
        if (glyph[row] & (1 << (4 - col)))
          for (let sy = 0; sy < scale; sy++)
            for (let sx = 0; sx < scale; sx++)
              setPixel(cx + i * (6 * scale) + col * scale + sx, cy + row * scale + sy, r, g, b);
  }
}

function drawLine(x0, y0, x1, y1, r, g, b) {
  x0=x0|0;y0=y0|0;x1=x1|0;y1=y1|0;
  let dx = Math.abs(x1-x0), dy = -Math.abs(y1-y0);
  let sx = x0<x1?1:-1, sy = y0<y1?1:-1;
  let err = dx + dy;
  while (true) {
    setPixel(x0, y0, r, g, b);
    if (x0===x1 && y0===y1) break;
    const e2 = 2*err;
    if (e2 >= dy) { err += dy; x0 += sx; }
    if (e2 <= dx) { err += dx; y0 += sy; }
  }
}

function drawParam(x, y, name, value, r, g, b) {
  drawText(x, y, name + '=' + value, r, g, b, 1);
}

function drawLabel(x, y, text, r, g, b) {
  const w = text.length * 6 + 2, h = 7;
  for (let py = y-1; py <= y+h; py++)
    for (let px = x-1; px <= x+w; px++)
      if (px >= 0 && px < W && py >= 0 && py < H) {
        const i = (py * W + px) << 2;
        pixels[i] = pixels[i] * 0.4 | 0;
        pixels[i+1] = pixels[i+1] * 0.4 | 0;
        pixels[i+2] = pixels[i+2] * 0.4 | 0;
      }
  drawText(x, y, text, r, g, b, 1);
}

// ═══ BLOOM POST-PROCESSING ═══

function applyBloom(threshold, radius, strength) {
  const buf = new Float32Array(W * H);
  // Extract bright pixels
  for (let i = 0; i < W * H; i++) {
    const idx = i << 2;
    const lum = (pixels[idx] + pixels[idx+1] + pixels[idx+2]) / 3;
    buf[i] = lum > threshold ? (lum - threshold) / (255 - threshold) : 0;
  }
  // Horizontal blur
  const tmp = new Float32Array(W * H);
  for (let y = 0; y < H; y++)
    for (let x = 0; x < W; x++) {
      let sum = 0, wt = 0;
      for (let dx = -radius; dx <= radius; dx++) {
        const sx = x + dx;
        if (sx < 0 || sx >= W) continue;
        const w = Math.exp(-dx * dx / (2 * radius * radius / 4));
        sum += buf[y * W + sx] * w;
        wt += w;
      }
      tmp[y * W + x] = sum / wt;
    }
  // Vertical blur + composite
  for (let y = 0; y < H; y++)
    for (let x = 0; x < W; x++) {
      let sum = 0, wt = 0;
      for (let dy = -radius; dy <= radius; dy++) {
        const sy = y + dy;
        if (sy < 0 || sy >= H) continue;
        const w = Math.exp(-dy * dy / (2 * radius * radius / 4));
        sum += tmp[sy * W + x] * w;
        wt += w;
      }
      const bloom = sum / wt * strength * 255;
      if (bloom > 0.5) {
        const i = (y * W + x) << 2;
        pixels[i] = Math.min(255, pixels[i] + bloom * 1.0) | 0;
        pixels[i+1] = Math.min(255, pixels[i+1] + bloom * 0.9) | 0;
        pixels[i+2] = Math.min(255, pixels[i+2] + bloom * 0.8) | 0;
      }
    }
}

// ═══ RENDER HELPERS ═══

function march(ox,oy,oz,dx,dy,dz,fn,steps) {
  let t=0;
  for(let i=0;i<(steps||48);i++){
    const d=fn(ox+dx*t,oy+dy*t,oz+dz*t);
    if(d<0.005)return t;
    t+=d; if(t>20)break;
  }
  return -1;
}

function calcNorm(x,y,z,fn) {
  const e=0.0005,d=fn(x,y,z);
  const nx=fn(x+e,y,z)-d, ny=fn(x,y+e,z)-d, nz=fn(x,y,z+e)-d;
  const l=Math.sqrt(nx*nx+ny*ny+nz*nz)||1;
  return [nx/l,ny/l,nz/l];
}

function render3D(t, sceneFn, camDist, colorFn, opts) {
  opts = opts || {};
  const RW=160, RH=100;
  const specPow = opts.specPow || 16;
  const specStr = opts.specStr || 0.3;
  const doShadow = opts.shadow || false;
  const doAO = opts.ao !== false; // on by default
  const lightDir = opts.lightDir || [0.577, 0.577, -0.577];
  const ll = Math.sqrt(lightDir[0]**2+lightDir[1]**2+lightDir[2]**2)||1;
  const lx=lightDir[0]/ll, ly=lightDir[1]/ll, lz=lightDir[2]/ll;

  const ax=mouseX+t*0.15, ay=clamp(mouseY,-1.2,-0.1);
  const camX=camDist*Math.sin(ax)*Math.cos(ay);
  const camY=camDist*Math.sin(-ay);
  const camZ=camDist*Math.cos(ax)*Math.cos(ay);
  let fl=Math.sqrt(camX*camX+camY*camY+camZ*camZ)||1;
  let fwX=-camX/fl,fwY=-camY/fl,fwZ=-camZ/fl;
  let rtX=fwZ,rtY=0,rtZ=-fwX;
  let rl=Math.sqrt(rtX*rtX+rtZ*rtZ)||1; rtX/=rl; rtZ/=rl;
  let upX=rtY*fwZ-rtZ*fwY, upY=rtZ*fwX-rtX*fwZ, upZ=rtX*fwY-rtY*fwX;
  const fov=1.5, asp=RW/RH;
  for(let py=0;py<RH;py++) for(let px=0;px<RW;px++){
    const u=(px/RW-0.5)*fov*asp, v=(0.5-py/RH)*fov;
    let rdx=fwX+rtX*u+upX*v, rdy=fwY+rtY*u+upY*v, rdz=fwZ+rtZ*u+upZ*v;
    const rdl=Math.sqrt(rdx*rdx+rdy*rdy+rdz*rdz); rdx/=rdl; rdy/=rdl; rdz/=rdl;
    const mt=march(camX,camY,camZ,rdx,rdy,rdz,sceneFn);
    let r,g,b;
    if(mt>0){
      const hx=camX+rdx*mt,hy=camY+rdy*mt,hz=camZ+rdz*mt;
      const n=calcNorm(hx,hy,hz,sceneFn);
      // Diffuse
      const diff=Math.max(0,n[0]*lx+n[1]*ly+n[2]*lz);
      // Specular (Phong)
      const reflX=2*diff*n[0]-lx, reflY=2*diff*n[1]-ly, reflZ=2*diff*n[2]-lz;
      const viewDot=Math.max(0,-(reflX*rdx+reflY*rdy+reflZ*rdz));
      const spec=Math.pow(viewDot,specPow)*specStr;
      // Ambient occlusion
      let ao=1;
      if(doAO){
        ao=0;
        for(let i=1;i<=5;i++){
          const step=i*0.06;
          const sd=sceneFn(hx+n[0]*step,hy+n[1]*step,hz+n[2]*step);
          ao+=Math.max(0,(step-sd)/step)*(1/(1<<i));
        }
        ao=clamp(1-ao*1.5,0.15,1);
      }
      // Soft shadow
      let shadow=1;
      if(doShadow){
        let st=0.02;shadow=1;
        for(let i=0;i<24;i++){
          const sd=sceneFn(hx+lx*st,hy+ly*st,hz+lz*st);
          if(sd<0.002){shadow=0.15;break;}
          shadow=Math.min(shadow,8*sd/st);
          st+=Math.max(sd,0.01);if(st>5)break;
        }
        shadow=clamp(shadow,0.15,1);
      }
      const li=0.12+0.88*diff*ao*shadow;
      if(colorFn)[r,g,b]=colorFn(hx,hy,hz,n,li,mt,spec);
      else{r=li*200+spec*255;g=li*180+spec*230;b=li*160+spec*200;}
      // Exponential fog
      const fog=1-Math.exp(-mt*mt*0.008);
      r=r*(1-fog)+15*fog; g=g*(1-fog)+14*fog; b=b*(1-fog)+12*fog;
    }else{r=15;g=14;b=12;}
    const sx=px*2,sy=py*2;
    setPixel(sx,sy,r,g,b);setPixel(sx+1,sy,r,g,b);
    setPixel(sx,sy+1,r,g,b);setPixel(sx+1,sy+1,r,g,b);
  }
}

function highlight(src) {
  if(!src)return '';
  src=src.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  src=src.replace(/("(?:[^"\\]|\\.)*")/g,'<span class="st">$1</span>');
  src=src.replace(/(\/\/.*)/g,'<span class="cm">$1</span>');
  src=src.replace(/(\/\*[\s\S]*?\*\/)/g,'<span class="cm">$1</span>');
  src=src.replace(/\b(\d+\.?\d*f?)\b/g,'<span class="nu">$1</span>');
  src=src.replace(/\b(float|vec[234]|mat[234]|int|uint|bool|void|sampler2D|ivec[234])\b/g,'<span class="ty">$1</span>');
  src=src.replace(/\b(if|else|for|while|return|struct|uniform|varying|in|out|const|break|continue|discard|#define)\b/g,'<span class="kw">$1</span>');
  src=src.replace(/\b([a-zA-Z_]\w*)\s*(?=\()/g,'<span class="fn">$1</span>');
  return src;
}

note:`Perlin noise sampled along a vertical cross-section creates layered strata. By stretching the noise horizontally and compressing vertically, you get sedimentary layers that fracture at irregular intervals.`,
code:`float cliff(vec2 p) {

note:`Subtract a smooth channel from the terrain heightfield using a Gaussian centered on the river path. The river path itself is a low-frequency noise curve, and erosion deepens near it exponentially.`,
code:`float valley(vec2 p) {
  float river = sin(p.x * 0.5) * 2.0;

code:`float canyon(vec2 p) {

  float layers = floor(n * 8.0) / 8.0;

}`},

note:`Simulate glacial deposits by displacing terrain with directional noise stretched along the flow direction. U-shaped valleys emerge from smooth subtraction of an elongated ellipsoid from the heightfield.`,
code:`float moraine(vec2 p, vec2 flow) {

{id:'coral',title:'Coral Branching',live:1,
note:`Recursive fractal branching from a trunk SDF. Each level splits the branch at an angle, reduces the radius, and takes the union. The result is a tree coral—pure recursive geometry from one line of distance function composition.`,
code:`float coral(vec2 p, float r, int depth) {
  float d = length(p) - r;
  if (depth <= 0) return d;

  vec2 right = rot(p, -0.5) - vec2(0, r*1.5);

  d = min(d, coral(right, r*0.65, depth-1));

    const dx=px-cx,dy=py-cy;
    let d=Math.sqrt(dx*dx+dy*dy)-r;
    if(depth<=0||r<2)return d;
    const a1=angle+0.45+Math.sin(t+depth)*0.1;

{id:'shell',title:'Shell Spiral',
note:`A logarithmic spiral r = a·e^(bθ) defines the shell's growth curve. The cross-section at each angle is a circle whose radius grows with r, creating a Nautilus-like structure.`,
code:`float shell(vec2 p) {

    let d1=Math.sqrt((x+w*0.3)**2+y*y)-r;
    let d2=Math.sqrt((x-w*0.3)**2+y*y)-r;
    let d=Math.max(d1,d2);
    d=Math.max(d,-y-0.8);d=Math.max(d,y-1.2);
    const thick=Math.abs(d)-0.06;
    const contour=Math.sin(d*40+t)*0.5+0.5;
    if(thick<0){
      // Stone texture via noise + depth shading
      const stone=noise2(px*0.15,py*0.15)*0.12+noise2(px*0.4,py*0.4)*0.06;
      const depth=0.85+Math.abs(d)*3;
      setPixel(px,py,(190+stone*100)*depth|0,(175+stone*80)*depth|0,(155+stone*60)*depth|0);
    }else{
      const g=Math.exp(-Math.max(0,thick)*8);
      setPixel(px,py,g*80+contour*25+15|0,g*60+contour*20+14|0,g*50+contour*15+12|0);
    }
  }
  drawLabel(5,3,'2 ARCS',200,180,140);
}},
{id:'staircase',title:'Spiral Staircase',live:1,
note:`A helix in SDF form: take the distance to a cylinder, modulate it with the angle around the y-axis, and you get steps that spiral upward. The central column is just another cylinder union.`,
code:`float staircase(vec3 p) {
  float col = length(p.xz) - 0.12;
  float r = length(p.xz);
  float a = atan(p.z, p.x);
  float spiralY = a / 6.283 * 2.0;
  float dy = p.y - spiralY;
  dy -= round(dy / 2.0) * 2.0;
  float step = max(abs(dy) - 0.05, max(r - 1.2, 0.2 - r));
  return min(col, step);
}`,
frame(t){
  render3D(t,(x,y,z)=>{
    const col=Math.sqrt(x*x+z*z)-0.12;
    const r=Math.sqrt(x*x+z*z);
    const a=Math.atan2(z,x);
    const spiralY=a/6.2832*2.0;
    const dy=y-spiralY;
    const mdy=dy-Math.round(dy/2.0)*2.0;
    const step=Math.max(Math.abs(mdy)-0.05,Math.max(r-1.2,0.2-r));
    return Math.min(col,step);
  },4,(px,py,pz,n,l,mt,spec)=>{
    const r=Math.sqrt(px*px+pz*pz);
    if(r<0.15) return[(l*100+spec*80)|0,(l*90+spec*70)|0,(l*85+spec*60)|0]; // dark column
    return[(l*200+spec*120)|0,(l*185+spec*100)|0,(l*165+spec*80)|0]; // lighter steps
  },{specPow:20,specStr:0.25});
}},
{id:'dome',title:'Geodesic Dome',
note:`A sphere intersected with a grid of planes creates triangular facets. The plane normals are derived from icosahedron vertices, subdivided to the desired frequency.`,
code:`float dome(vec3 p) {
  float s = length(p) - 2.0;
  // Facet by quantizing the normal direction
  vec3 n = normalize(p);
  n = floor(n * 8.0) / 8.0;
  float facet = dot(p, normalize(n)) - 1.95;
  return max(s, facet);
}`},
{id:'buttress',title:'Flying Buttress',
note:`An arc SDF connecting two vertical elements. The catenary curve y = a·cosh(x/a) gives the natural arch shape, and the SDF is the distance to this parametric curve.`,
code:`float buttress(vec2 p) {
  float arch_y = 1.5 * cosh((p.x - 1.0) / 1.5) - 0.5;
  float d = abs(p.y - arch_y) - 0.08;
  float pier = sdBox(p - vec2(0, 0), vec2(0.15, 1.5));
  return min(d, pier);
}`},
{id:'vault',title:'Vault Ribbing',
note:`Cross two barrel vault SDFs (cylinders) at right angles and intersect with a box room. The ribs are the intersection curves, highlighted by subtracting slightly offset vaults.`,
code:`float vault(vec3 p) {
  float c1 = length(p.xy - vec2(0,2)) - 3.0;
  float c2 = length(p.zy - vec2(0,2)) - 3.0;
  float room = sdBox(p, vec3(2,2,2));
  return max(room, max(c1, c2));
}`},
{id:'tracery',title:'Window Tracery',
note:`Recursive circle packing inside a pointed arch outline. Start with the arch SDF, subdivide the interior, and place tangent circles at each level of recursion.`,
code:`float tracery(vec2 p) {
  float arch = gothicArch(p, 1.0, 2.0);
  float circle1 = length(p - vec2(0, 0.8)) - 0.5;
  float circle2 = length(p - vec2(-0.3, 0.3)) - 0.3;
  float circle3 = length(p - vec2(0.3, 0.3)) - 0.3;
  return max(arch, -min(circle1, min(circle2, circle3)));
}`},
{id:'catenary',title:'Bridge Catenary',
note:`The catenary curve cosh(x/a) is the shape a chain makes under gravity—and the ideal arch. Its SDF is the distance to the parametric curve, with thickness for the deck and pylons as box SDFs.`,
code:`float bridge(vec2 p) {
  float cable = abs(p.y - cosh(p.x * 0.5) + 1.5) - 0.03;
  float deck = sdBox(p - vec2(0, -0.5), vec2(3.0, 0.05));
  return min(cable, deck);
}`},
]},

fluid: {
  label:'FLUID', thesis:'Water is a sum of sines. Turbulence is noise feeding noise.',
  items:[
{id:'waves',title:'Wave Superposition',live:1,
note:`Gerstner waves displace both horizontally and vertically, creating the trochoid shape with sharp crests and broad troughs. Sum 4-5 waves of different frequencies and directions for realistic ocean—no mesh deformation needed.`,
code:`vec2 gerstner(vec2 p, float t) {
  float A = 0.3, w = 2.0, phi = 1.5;
  float phase = p.x * w - t * phi;
  p.x -= A * sin(phase);
  p.y += A * cos(phase);
  return p;
}`,
frame(t){
  clear(15,20,35);
  const waves=[[0.25,1.5,1.2],[0.15,2.5,-0.8],[0.1,4.0,1.5],[0.08,6.0,-1.1],[0.05,9.0,0.7]];
  for(let x=0;x<W;x++){
    const fx=x/W*8;
    let h=0;
    for(const[A,w,spd]of waves) h+=A*Math.cos(fx*w-t*spd);
    const gy=(H*0.45-h*H*0.25)|0;
    for(let y=gy;y<H;y++){
      const d=(y-gy)/(H-gy);
      const foam=d<0.02?1:0;
      setPixel(x,y,30+foam*200+d*5|0,60+foam*180-d*20|0,120+foam*130-d*40|0);
    }
  }
}},
{id:'vortex',title:'Vortex Flow',live:1,
note:`Curl noise gives divergence-free velocity fields—fluid that swirls without compressing. Compute the curl of a 2D noise potential as (∂ψ/∂y, -∂ψ/∂x) and you get physically plausible turbulence for free.`,
code:`vec2 curlNoise(vec2 p) {
  float e = 0.01;
  float n = noise(p);
  float dx = noise(p + vec2(e, 0)) - n;
  float dy = noise(p + vec2(0, e)) - n;
  return vec2(dy, -dx) / e;
}`,
frame(t){
  const e=0.05;
  for(let py=0;py<H;py++)for(let px=0;px<W;px++){
    const x=px/H*4,y=py/H*4;
    const n0=fbm(x+t*0.2,y,3);
    const dx=fbm(x+e+t*0.2,y,3)-n0;
    const dy=fbm(x+t*0.2,y+e,3)-n0;
    const vx=dy/e,vy=-dx/e;
    const mag=Math.sqrt(vx*vx+vy*vy);
    const h=hue(Math.atan2(vy,vx)/6.28+0.5);
    const br=Math.min(1,mag*0.3);
    setPixel(px,py,h[0]*br+15|0,h[1]*br+14|0,h[2]*br+12|0);
  }
}},
{id:'ripples',title:'Raindrop Ripples',live:1,
note:`Concentric ring interference: each raindrop is a radial cosine wave that decays with distance and time. Multiple drops create the beautiful constructive/destructive interference patterns you see in puddles.`,
code:`float ripple(vec2 p, vec2 center, float birth, float t) {
  float r = length(p - center);
  float age = t - birth;
  float wave = cos(r * 15.0 - age * 8.0);
  float decay = exp(-age * 1.5) * exp(-r * 0.5);
  return wave * decay;
}`,
frame(t){
  if(!this._drops){this._drops=[];for(let i=0;i<8;i++)this._drops.push({x:Math.random()*W,y:Math.random()*H,birth:Math.random()*-5});}
  for(const d of this._drops){if(t-d.birth>4){d.x=Math.random()*W;d.y=Math.random()*H;d.birth=t;}}
  for(let py=0;py<H;py++)for(let px=0;px<W;px++){
    let v=0;
    for(const d of this._drops){
      const dx=px-d.x,dy=py-d.y;
      const r=Math.sqrt(dx*dx+dy*dy);
      const age=t-d.birth;if(age<0)continue;
      v+=Math.cos(r*0.3-age*5)*Math.exp(-age*0.8)*Math.exp(-r*0.02);
    }
    const c=v*0.5+0.5;
    setPixel(px,py,c*40+15|0,c*80+30|0,c*140+50|0);
  }
}},
{id:'kelvin',title:'Kelvin-Helmholtz',
note:`Shear instability between two fluid layers creates rolling waves. Simulate by advecting a density boundary with velocity that varies by sign of y, plus small noise perturbation.`,
code:`float kh(vec2 p, float t) {
  float shear = sign(p.y) * 0.5;
  float perturb = sin(p.x * 3.0 + t) * 0.1;
  float boundary = p.y + perturb;
  return smoothstep(-0.1, 0.1, boundary + shear * t * 0.1);
}`},
{id:'wake',title:'Wake Pattern',
note:`Kelvin wake: a boat creates waves confined to a 19.5° half-angle cone. Inside the cone, the height is a superposition of transverse and divergent wave systems.`,
code:`float wake(vec2 p, float speed) {
  float angle = atan(abs(p.y), p.x);
  float inCone = step(angle, 0.34);  // 19.47 degrees
  float phase = length(p) * 3.0 - p.x * speed;
  return sin(phase) * inCone * exp(-abs(p.y) * 0.5);
}`},
{id:'capillary',title:'Capillary Waves',
note:`Surface tension dominates at small scales, producing short-wavelength ripples with phase velocity proportional to sqrt(k). These disperse faster than gravity waves, creating the shimmering texture on calm water.`,
code:`float capillary(vec2 p, float t) {
  float h = 0.0;
  for (int i = 0; i < 8; i++) {
    float k = 10.0 + float(i) * 5.0;
    float omega = sqrt(k);  // dispersion relation
    h += sin(dot(p, normalize(hash2(i))) * k - t * omega) / k;
  }
  return h;
}`},
]},

crystal: {
  label:'CRYSTAL', thesis:'Crystals are intersections. Every facet is a half-plane.',
  items:[
{id:'gem',title:'Faceted Gem',live:1,
note:`A gemstone is a sphere intersected with dozens of half-planes at crystallographic angles. Each cutting plane d = dot(p, normal) - offset creates one facet. The brilliant cut's fire comes from total internal reflection—but the shape is pure SDF intersection.`,
code:`float gem(vec3 p) {
  float d = length(p) - 1.2;
  // Crown facets
  d = max(d, dot(p, normalize(vec3(1,1,0))) - 0.8);
  d = max(d, dot(p, normalize(vec3(-1,1,0))) - 0.8);
  d = max(d, dot(p, normalize(vec3(0,1,1))) - 0.8);
  d = max(d, dot(p, normalize(vec3(0,1,-1))) - 0.8);
  d = max(d, p.y - 0.6);    // table
  d = max(d, -p.y - 0.9);   // pavilion
  return d;
}`,
frame(t){
  const cuts=[[0,1,0,.55],[0,-1,0,.85],[1,1,0,.75],[-1,1,0,.75],[0,1,1,.75],[0,1,-1,.75],
    [1,-1,0,.9],[-1,-1,0,.9],[0,-1,1,.9],[0,-1,-1,.9],[1,0,1,.8],[-1,0,1,.8],[1,0,-1,.8],[-1,0,-1,.8]];
  for(const c of cuts){const l=Math.sqrt(c[0]*c[0]+c[1]*c[1]+c[2]*c[2])||1;c[0]/=l;c[1]/=l;c[2]/=l;}
  render3D(t,(x,y,z)=>{
    let d=sdSphere(x,y,z,1.1);
    for(const[nx,ny,nz,off]of cuts) d=Math.max(d,x*nx+y*ny+z*nz-off);
    return d;
  },4,(px,py,pz,n,l,mt,spec)=>{
    // Rainbow dispersion via view-angle hue offset
    const dispersion=n[0]*0.3+n[1]*0.2+n[2]*0.1+t*0.05;
    const h1=hue(dispersion+0.55);
    const h2=hue(dispersion+0.65);
    const h3=hue(dispersion+0.45);
    const blend=Math.sin(py*8+t)*0.5+0.5;
    const r=lerp(h1[0],h2[0],blend)*l+spec*280;
    const g=lerp(h1[1],h3[1],blend)*l+spec*260;
    const b=lerp(h1[2],h2[2],blend)*l+spec*220;
    return[r|0,g|0,b|0];
  },{specPow:64,specStr:0.8});
  applyBloom(120,4,0.6);
}},
{id:'voronoi_growth',title:'Voronoi Growth',live:1,
note:`Cellular noise simulates crystal grain boundaries. The edge distance F2-F1 reveals the Voronoi boundary network. Add time-varying glow to edges and you see crystal growth fronts propagating through the material.`,
code:`vec3 crystal(vec2 p, float t) {
  float f1, f2, id;
  voronoi(p, f1, f2, id);
  float edge = f2 - f1;
  float glow = exp(-edge * 20.0) * (sin(t * 3.0) * 0.3 + 0.7);
  vec3 col = hue(id * 0.7) * 0.3;
  return col + vec3(0.2, 0.5, 1.0) * glow;
}`,
frame(t){
  for(let py=0;py<H;py++)for(let px=0;px<W;px++){
    const x=px/H*5+t*0.05,y=py/H*5;
    const[d,id]=voronoi(x,y);
    const edge=voronoiEdge(x,y);
    const glow=Math.exp(-edge*25)*(Math.sin(t*3)*0.3+0.7);
    const h=hue(id*0.7);
    setPixel(px,py,h[0]*0.25+glow*60+15|0,h[1]*0.2+glow*130+14|0,h[2]*0.15+glow*255+12|0);

}},
{id:'snowflake',title:'Snowflake',live:1,
note:`Six-fold symmetry: fold the angle into one-sixth of the plane using modular arithmetic, then draw branch SDFs in the folded space. Sub-branches at fixed intervals along the main arm create dendritic complexity from a single symmetry operation.`,
code:`float snowflake(vec2 p) {
  float r = length(p);
  float a = atan(p.y, p.x);
  a = mod(a, PI/3.0);
  if (a > PI/6.0) a = PI/3.0 - a;
  p = vec2(cos(a), sin(a)) * r;
  // Main branch + sub-branches
  float d = abs(p.y) - 0.06;
  for (int i = 1; i <= 3; i++) {
    float bx = float(i) * 0.35;
    d = min(d, max(abs(p.y-(p.x-bx)*0.5)-0.03, abs(p.x-bx)-0.18));
  }
  return min(d, r - 0.12);
}`,
frame(t){
  for(let py=0;py<H;py++)for(let px=0;px<W;px++){
    let x=(px-W/2)/80,y=(py-H/2)/80;
    const r=Math.sqrt(x*x+y*y);
    let a=Math.atan2(y,x);
    a=((a%(Math.PI/3))+Math.PI/3)%(Math.PI/3);
    if(a>Math.PI/6)a=Math.PI/3-a;
    x=r*Math.cos(a);y=r*Math.sin(a);
    let d=Math.abs(y)-0.06;
    for(let i=1;i<=3;i++){
      const bx=i*0.35;
      d=Math.min(d,Math.max(Math.abs(y-(x-bx)*0.5)-0.03,Math.abs(x-bx)-0.18));
    }
    d=Math.min(d,r-0.12);
    if(d<0){
      const c=0.8+Math.sin(r*30+t*2)*0.15;
      setPixel(px,py,c*180+40|0,c*200+50|0,c*255|0);
    }else{
      const g=Math.exp(-d*12)*(Math.sin(t*1.5)*0.2+0.8);
      setPixel(px,py,g*60+15|0,g*100+14|0,g*180+12|0);
    }
  }
  applyBloom(140,3,0.5);
  drawLabel(5,3,'FOLD=6',180,220,255);
}},
{id:'lattice',title:'Lattice Structure',
note:`A 3D crystal lattice is spheres at integer coordinates. The SDF is just sdSphere applied to the fractional part of position—infinite repetition with zero memory.`,
code:`float lattice(vec3 p) {
  vec3 q = fract(p) - 0.5;
  return length(q) - 0.15;
}`},
{id:'geode',title:'Amethyst Geode',
note:`An outer shell (sphere SDF) with the interior carved by Voronoi prisms growing inward. Each prism is a cylinder aligned to the Voronoi cell's centroid direction.`,
code:`float geode(vec3 p) {
  float shell = abs(length(p) - 2.0) - 0.1;
  vec3 dir = normalize(p);
  float prism = voronoi(dir.xy * 5.0).x - 0.1;
  float interior = length(p) - 1.5 + prism * 0.3;
  return max(shell, -interior);
}`},
{id:'twinning',title:'Crystal Twinning',
note:`Mirror a crystal SDF across a twin plane, then take the union. The twin boundary shows up as a planar discontinuity in the facet pattern—two crystals sharing atoms at the interface.`,
code:`float twinned(vec3 p) {
  float c1 = gem(p);
  vec3 mirrored = p - 2.0 * dot(p, twinPlane) * twinPlane;
  float c2 = gem(mirrored);
  return min(c1, c2);
}`},
{id:'dendritic',title:'Dendritic Growth',
note:`Diffusion-limited aggregation creates fractal crystal trees. Simulate by random-walking particles that stick on contact with the growing cluster, or approximate with recursive branching SDFs.`,
code:`float dendrite(vec2 p, int depth) {
  float d = sdSegment(p, vec2(0), vec2(0, 1.0));
  if (depth <= 0) return d;
  float branch_angle = 0.6;
  vec2 tip = vec2(0, 1.0);
  // Two branches from tip
  d = min(d, dendrite(rot(p - tip, branch_angle), depth-1) * 0.7);
  d = min(d, dendrite(rot(p - tip, -branch_angle), depth-1) * 0.7);
  return d;
}`},
]},

industrial: {
  label:'INDUSTRIAL', thesis:'Machines are math made metal. Every gear is a polar function.',
  items:[
{id:'gear',title:'Gear Teeth',live:1,
note:`A gear is a circle with sinusoidal radius modulation in polar coordinates. The number of teeth determines the frequency, and the modulation depth sets the tooth height. One cosine function replaces hundreds of mesh triangles.`,
code:`float gear(vec2 p, float teeth, float r) {
  float angle = atan(p.y, p.x);
  float tooth = cos(angle * teeth) * 0.12;
  float body = length(p) - (r + tooth);
  float hole = 0.2 - length(p);
  return max(-body, hole);
}`,
frame(t){
  for(let py=0;py<H;py++)for(let px=0;px<W;px++){
    const x=(px-W/2)/80,y=(py-H/2)/80;

    const a=Math.atan2(y,x)+t;
    const tooth=Math.cos(a*12)*0.12;
    const body=r-(0.8+tooth);
    const hole=0.18-r;

    }else if(body<0&&spoke>0){setPixel(px,py,20,19,17);}
    else if(body<0){
      const highlight=Math.pow(Math.max(0,Math.cos(a-t*0.5)),4)*0.2;
      setPixel(px,py,(175+highlight*150)|0,(165+highlight*130)|0,(145+highlight*100)|0);
    }

}},
{id:'helix',title:'Thread Helix',live:1,
note:`A helix is a circle in the (r, y-mod-pitch) plane, repeated vertically. The SDF is the distance to this circle after folding y into one pitch period. Bolt threads, drill bits, and springs are all helical SDFs.`,
code:`float thread(vec3 p, float pitch, float r, float thick) {
  float y_local = mod(p.y, pitch) - pitch * 0.5;
  float r_local = length(p.xz) - r;
  return length(vec2(r_local, y_local)) - thick;
}`,
frame(t){
  render3D(t,(x,y,z)=>{
    const r=Math.sqrt(x*x+z*z);
    const pitch=0.6;
    const ym=((y%pitch)+pitch)%pitch-pitch*0.5;
    const rl=r-0.6;
    const thread=Math.sqrt(rl*rl+ym*ym)-0.12;
    const core=r-0.45;
    return Math.min(thread,core);
  },4,(px,py,pz,n,l,mt,spec)=>{
    // Steel-blue metallic
    return[(l*140+spec*200)|0,(l*155+spec*220)|0,(l*180+spec*255)|0];
  },{specPow:48,specStr:0.6});
}},
{id:'pipes',title:'Pipe Junction',live:1,
note:`Smooth union of perpendicular cylinders creates organic plumbing junctions. The blend radius k controls how sharp or bulbous the connection is—from welded to cast to 3D-printed.`,
code:`float pipes(vec3 p) {
  float c1 = length(p.yz) - 0.3;  // X-axis pipe
  float c2 = length(p.xz) - 0.3;  // Y-axis pipe
  float c3 = length(p.xy) - 0.3;  // Z-axis pipe
  return smin(smin(c1, c2, 0.2), c3, 0.2);
}`,
frame(t){
  render3D(t,(x,y,z)=>{
    const c1=Math.sqrt(y*y+z*z)-0.35;
    const c2=Math.sqrt(x*x+z*z)-0.35;
    const c3=Math.sqrt(x*x+y*y)-0.35;
    return opSmoothUnion(opSmoothUnion(c1,c2,0.25),c3,0.25);
  },4,(px,py,pz,n,l,mt,spec)=>{
    const rust=noise2(px*5,pz*5)*0.2+noise2(px*12,py*12)*0.1;
    return[(l*(180+rust*100)+spec*100)|0,(l*(130+rust*30)+spec*70)|0,(l*(80-rust*50)+spec*50)|0];
  },{specPow:20,specStr:0.3});
}},
{id:'bearing',title:'Bearing Balls',
note:`Balls in a raceway: sdSphere repeated in polar coordinates around a torus cross-section. The cage is a torus with periodic notches cut by subtracted boxes.`,
code:`float bearing(vec3 p) {
  float race = sdTorus(p, 1.0, 0.15);
  float angle = atan(p.z, p.x);
  float idx = floor(angle / (6.28 / 8.0) + 0.5);
  float a = idx * 6.28 / 8.0;
  vec3 ballPos = vec3(cos(a), 0, sin(a));
  float ball = length(p - ballPos) - 0.12;
  return min(race, ball);
}`},
{id:'turbine',title:'Turbine Blade',
note:`An airfoil cross-section extruded and twisted along the span axis. The twist is a linear function of height, rotating the NACA profile progressively from root to tip.`,
code:`float turbine(vec3 p) {
  float twist = p.y * 0.8;
  vec2 q = rot2(p.xz, twist);
  // NACA airfoil approximation
  float chord = 0.6 - p.y * 0.15;
  float camber = 0.1 * sin(q.x / chord * 3.14);
  return abs(q.y - camber) - 0.03 * (1.0 - q.x/chord);
}`},
{id:'spring',title:'Spring Coil',
note:`A torus that advances along its axis: the helix. The SDF is distance to a circle whose center orbits a line, combining the torus formula with linear y-advance per revolution.`,
code:`float spring(vec3 p, float coils, float r, float thick) {
  float a = atan(p.z, p.x);
  float y_expect = a / 6.28 * (1.0 / coils);
  float dy = mod(p.y - y_expect + 0.5, 1.0/coils) - 0.5/coils;
  float dr = length(p.xz) - r;
  return length(vec2(dr, dy)) - thick;
}`},
{id:'cam',title:'Cam Profile',
note:`A cam converts rotation to translation via a shaped radius profile. The SDF is r(θ) - measured_r, where r(θ) encodes the follower displacement curve (harmonic, cycloidal, or polynomial).`,
code:`float cam(vec2 p, float angle) {
  float a = atan(p.y, p.x) + angle;
  float r_profile = 0.5 + 0.2 * smoothstep(0.0, 3.14, mod(a, 6.28));
  return length(p) - r_profile;
}`},
]},

mathematical: {
  label:'MATH', thesis:'Math objects are their own geometry. The equation IS the shape.',
  items:[
{id:'mandelbrot',title:'Mandelbrot Set',live:1,
note:`The most famous fractal is pure iteration: z = z² + c. Each pixel is a complex number c, and we count how many iterations before the sequence escapes to infinity. The boundary between escape and capture generates infinite complexity from a one-line formula.`,
code:`vec3 mandelbrot(vec2 c) {
  vec2 z = vec2(0);
  int i;
  for (i = 0; i < 256; i++) {
    z = vec2(z.x*z.x - z.y*z.y, 2.0*z.x*z.y) + c;
    if (dot(z, z) > 256.0) break;
  }
  float smooth_i = float(i) + 1.0 - log2(log2(dot(z,z)));
  return hue(smooth_i * 0.02);
}`,
frame(t){
  const cx=-0.5+Math.sin(t*0.1)*0.3,cy=Math.cos(t*0.13)*0.3;
  const zoom=2.5-Math.sin(t*0.07)*1.2;
  for(let py=0;py<H;py++)for(let px=0;px<W;px++){
    const cr=cx+(px/W-0.5)*zoom*(W/H),ci=cy+(py/H-0.5)*zoom;
    let zr=0,zi=0,i=0;
    for(;i<128;i++){
      const zr2=zr*zr,zi2=zi*zi;
      if(zr2+zi2>256)break;
      zi=2*zr*zi+ci;zr=zr2-zi2+cr;
    }
    if(i>=128){setPixel(px,py,15,14,12);}
    else{

      const h=hue(hv);

      setPixel(px,py,h[0]*br*sat|0,h[1]*br*0.85|0,h[2]*br|0);

  drawParam(5,14,'ZOOM',zoom.toFixed(1),160,180,140);
}},
{id:'julia',title:'Julia Set',live:1,
note:`Same iteration as Mandelbrot, but c is a fixed parameter and z₀ is the pixel coordinate. Animate c along a circle in the complex plane and watch the fractal morph between connected and disconnected—the entire Mandelbrot set is a map of Julia set connectivity.`,
code:`vec3 julia(vec2 z, vec2 c) {
  int i;
  for (i = 0; i < 256; i++) {
    z = vec2(z.x*z.x - z.y*z.y, 2.0*z.x*z.y) + c;
    if (dot(z, z) > 4.0) break;
  }
  float smooth_i = float(i) + 1.0 - log2(log2(dot(z,z)));
  return hue(smooth_i * 0.03);
}`,

    }

{id:'gyroid',title:'Gyroid Surface',live:1,
note:`sin(x)cos(y) + sin(y)cos(z) + sin(z)cos(x) = 0 defines a triply periodic minimal surface. This single equation creates geometry so complex it's used in aerospace lattice structures, tissue scaffolds, and photonic crystals.`,
code:`float gyroid(vec3 p) {
  float s = 2.5;
  float g = sin(p.x*s)*cos(p.y*s)
          + sin(p.y*s)*cos(p.z*s)
          + sin(p.z*s)*cos(p.x*s);
  return abs(g) / s - 0.08;
}`,
frame(t){
  render3D(t,(x,y,z)=>{
    const s=2.5;
    const g=Math.sin(x*s)*Math.cos(y*s)+Math.sin(y*s)*Math.cos(z*s)+Math.sin(z*s)*Math.cos(x*s);
    return Math.abs(g)/s-0.08;
  },4,(px,py,pz,n,l,mt,spec)=>{
    // Iridescent rainbow based on surface normal
    const h=hue(n[0]*0.3+n[1]*0.4+n[2]*0.3+t*0.03+0.55);
    return[(h[0]*l+spec*180)|0,(h[1]*l+spec*160)|0,(h[2]*l+spec*200)|0];
  },{specPow:32,specStr:0.45});
}},
{id:'klein',title:'Klein Bottle',
note:`A non-orientable surface that passes through itself in 3D. Its implicit equation in 4D projected to 3D creates a surface with no inside or outside—a topological puzzle rendered as an SDF.`,
code:`float klein(vec3 p) {
  // Parametric immersion in R3
  float u = atan(p.z, p.x);
  float v = atan(p.y, length(p.xz) - 2.0);
  float r = length(vec2(length(p.xz) - 2.0, p.y));
  return r - 0.5 - 0.3 * cos(v) * sin(u);
}`},
{id:'mobius',title:'Mobius Strip',
note:`A rectangle that twists 180° before joining its ends. The SDF computes distance to a parametric surface r(u,v) where v spans the width and u spans the loop with a half-twist.`,
code:`float mobius(vec3 p) {
  float a = atan(p.z, p.x);
  float r = length(p.xz) - 1.5;
  float halfTwist = a * 0.5;
  float u = r * cos(halfTwist) + p.y * sin(halfTwist);
  float v = -r * sin(halfTwist) + p.y * cos(halfTwist);
  return abs(u) - 0.3;
}`},
{id:'lorenz',title:'Lorenz Attractor',
note:`Three coupled ODEs produce chaotic trajectories that never repeat but stay on a butterfly-shaped attractor. The geometry is emergent—no explicit surface, just the trace of a point in phase space.`,
code:`// dx/dt = sigma * (y - x)
// dy/dt = x * (rho - z) - y
// dz/dt = x * y - beta * z
void lorenz(float* x, float* y, float* z, float dt) {
  float dx = 10.0 * (*y - *x);
  float dy = *x * (28.0 - *z) - *y;
  float dz = *x * *y - 2.667 * *z;
  *x += dx * dt; *y += dy * dt; *z += dz * dt;
}`},
{id:'sierpinski',title:'Sierpinski Triangle',
note:`Remove the center triangle at every scale, recursively. The fractal dimension is log(3)/log(2) ≈ 1.585—more than a line but less than a plane. In SDF form, fold the point into one sub-triangle per iteration.`,
code:`float sierpinski(vec2 p, int iters) {
  for (int i = 0; i < iters; i++) {
    p *= 2.0;
    p -= floor(p / 2.0) * 2.0;  // fold
    if (p.x + p.y > 1.0)
      p = vec2(1.0) - p;         // reflect
  }
  return length(p - vec2(0.5)) - 0.4 / pow(2.0, float(iters));
}`},
{id:'lissajous',title:'Lissajous Curve',
note:`x = sin(at + δ), y = sin(bt). The ratio a:b determines the number of lobes, and the phase δ controls the curve's evolution between open and closed forms.`,
code:`vec2 lissajous(float t, float a, float b, float delta) {
  return vec2(sin(a * t + delta), sin(b * t));
}`},
]},

atmospheric: {
  label:'ATMO', thesis:'The sky is a volume integral. Every cloud is density = f(x,y,z).',
  items:[
{id:'fog',title:'Volumetric Fog',live:1,
note:`March a ray through 3D noise, accumulating density and extinction at each step. Beer-Lambert law: transmittance = exp(-∫σ·dt). No mesh, no particles—just noise sampled along a ray with exponential falloff.`,
code:`vec3 volumetricFog(vec3 ro, vec3 rd) {
  float T = 1.0;  // transmittance
  vec3 col = vec3(0);
  for (float t = 0.0; t < 10.0; t += 0.1) {
    vec3 p = ro + rd * t;
    float density = max(0.0, fbm(p * 0.5) - 0.3);
    T *= exp(-density * 0.1);
    col += T * density * vec3(0.8, 0.7, 0.6) * 0.1;
  }
  return col;
}`,
frame(t){
  const RW=160,RH=100;
  for(let py=0;py<RH;py++)for(let px=0;px<RW;px++){
    const u=(px/RW-0.5)*2,v=(0.5-py/RH)*1.2;
    let rdx=0,rdy=v*0.5+0.2,rdz=-1;
    const rl=Math.sqrt(rdx*rdx+rdy*rdy+rdz*rdz);rdx/=rl;rdy/=rl;rdz/=rl;
    let T=1,cr=0,cg=0,cb=0;
    for(let s=0;s<40;s++){
      const st=s*0.25;
      const px2=u*2+st*rdx+t*0.2,py2=1+st*rdy,pz2=st*rdz;
      const density=Math.max(0,fbm3(px2*0.4,py2*0.4,pz2*0.4+t*0.1,4)-0.25);
      T*=Math.exp(-density*0.15);
      const light=Math.max(0,1-fbm3(px2*0.4,py2*0.4+0.5,pz2*0.4+t*0.1,3)*0.5);
      cr+=T*density*light*0.22;cg+=T*density*light*0.18;cb+=T*density*light*0.14;
      if(T<0.01)break;
    }
    const sky_r=20+py/RH*15,sky_g=25+py/RH*10,sky_b=45-py/RH*10;
    const r2=(cr*255+sky_r*T)|0,g2=(cg*255+sky_g*T)|0,b2=(cb*255+sky_b*T)|0;
    const sx=px*2,sy=py*2;
    setPixel(sx,sy,r2,g2,b2);setPixel(sx+1,sy,r2,g2,b2);
    setPixel(sx,sy+1,r2,g2,b2);setPixel(sx+1,sy+1,r2,g2,b2);
  }
}},
{id:'aurora',title:'Aurora Borealis',live:1,
note:`Vertical curtains of light driven by noise that stretches horizontally and compresses vertically. The color ramp runs green→cyan→purple as altitude increases, mimicking oxygen and nitrogen emission spectra.`,
code:`vec3 aurora(vec2 uv, float t) {
  float curtain = 0.0;
  for (int i = 0; i < 5; i++) {
    float freq = 1.0 + float(i) * 0.5;
    curtain += sin(uv.x * freq + t * 0.3 + float(i)) * 0.2;
  }
  float intensity = exp(-abs(uv.y - curtain) * 8.0);
  vec3 col = mix(vec3(0.1, 0.8, 0.3), vec3(0.4, 0.2, 0.8), uv.y);
  return col * intensity;
}`,
frame(t){
  for(let py=0;py<H;py++)for(let px=0;px<W;px++){
    const u=px/W*4-2,v=1-py/H;
    let totalR=0,totalG=0,totalB=0;
    // 3 depth layers of curtains
    for(let layer=0;layer<3;layer++){
      let curtain=0;
      const off=layer*1.5;
      const spd=0.4-layer*0.08;
      for(let i=0;i<5;i++){curtain+=Math.sin((u+off)*(1+i*0.5)+t*spd+i*1.3+layer*2)*0.15;}
      curtain+=noise2((u+off)*2+t*0.2-layer,v*0.5+layer*3)*0.1;
      const intensity=Math.exp(-Math.abs(v*0.8-0.3-curtain)*12)*v;
      const fade=1-layer*0.25; // back layers fainter
      // More vivid green/purple per layer
      if(layer===0){totalR+=lerp(40,160,v)*intensity*fade;totalG+=lerp(240,80,v)*intensity*fade;totalB+=lerp(100,240,v)*intensity*fade;}
      else if(layer===1){totalR+=lerp(60,140,v)*intensity*fade;totalG+=lerp(180,50,v)*intensity*fade;totalB+=lerp(120,220,v)*intensity*fade;}
      else{totalR+=lerp(20,100,v)*intensity*fade;totalG+=lerp(200,60,v)*intensity*fade;totalB+=lerp(80,180,v)*intensity*fade;}
    }
    const star=(ihash(px,py)>0.997)?200:0;
    const si=1-clamp(totalR+totalG+totalB,0,400)/400;
    setPixel(px,py,clamp(totalR+star*si,0,255)|0,clamp(totalG+star*0.9*si,0,255)|0,clamp(totalB+star*0.8*si,0,255)|0);
  }
  applyBloom(100,4,0.5);
}},
{id:'lightning',title:'Lightning Bolt',live:1,
note:`A random walk from cloud to ground, branching with decreasing probability at each step. At each node, the direction jitters by noise, and side branches spawn with probability that decays with depth. The glow is distance-to-polyline with exponential falloff.`,
code:`void lightning(vec2 start, vec2 end, int depth) {
  if (depth <= 0) { drawLine(start, end); return; }
  vec2 mid = mix(start, end, 0.5);
  mid.x += random() * 0.3;
  lightning(start, mid, depth - 1);
  lightning(mid, end, depth - 1);
  if (random() < 0.3)  // branch
    lightning(mid, mid + randomDir() * 0.3, depth - 2);
}`,
frame(t){
  if(!this._bolt||t-this._boltT>0.8){
    this._bolt=[];this._boltT=t;
    const genBolt=(x1,y1,x2,y2,depth)=>{
      if(depth<=0){this._bolt.push([x1,y1,x2,y2]);return;}
      const mx=(x1+x2)/2+(Math.random()-0.5)*30*(depth/6);
      const my=(y1+y2)/2;
      genBolt(x1,y1,mx,my,depth-1);genBolt(mx,my,x2,y2,depth-1);
      if(Math.random()<0.35)genBolt(mx,my,mx+(Math.random()-0.5)*40,my+(y2-y1)*0.3*Math.random(),depth-2);
    };
    genBolt(W/2+Math.random()*60-30,10,W/2+Math.random()*40-20,H-10,6);
  }
  clear(12,12,20);
  const flash=Math.max(0,1-(t-this._boltT)*3);
  if(flash>0.5)for(let i=0;i<pixels.length;i+=4){pixels[i]+=flash*15;pixels[i+1]+=flash*15;pixels[i+2]+=flash*25;}
  for(const[x1,y1,x2,y2]of this._bolt){
    const steps=Math.max(Math.abs(x2-x1),Math.abs(y2-y1))*2|0;
    for(let i=0;i<=steps;i++){
      const px2=lerp(x1,x2,i/steps)|0,py2=lerp(y1,y2,i/steps)|0;
      for(let dy=-3;dy<=3;dy++)for(let dx=-3;dx<=3;dx++){
        const d=Math.sqrt(dx*dx+dy*dy);
        const g=Math.exp(-d*0.8)*flash;
        const ox=px2+dx,oy=py2+dy;
        if(ox>=0&&ox<W&&oy>=0&&oy<H){
          const idx=(oy*W+ox)<<2;
          pixels[idx]=Math.min(255,pixels[idx]+g*200|0);
          pixels[idx+1]=Math.min(255,pixels[idx+1]+g*180|0);
          pixels[idx+2]=Math.min(255,pixels[idx+2]+g*255|0);
        }
      }
    }
  }
}},
{id:'cloud',title:'Cloud Layer',
note:`Clouds are density fields: sample 3D FBM noise at each point, threshold to create edges, light by marching toward the sun and measuring optical depth. The density itself is the geometry.`,
code:`float cloud(vec3 p) {
  float base = -p.y + 5.0;
  float detail = fbm(p * 0.5, 5);
  return base + detail * 2.0;
}`},
{id:'sunshaft',title:'Sun Shaft',
note:`Volumetric light scattering: march from pixel toward the sun, sampling occlusion at each step. Where the ray passes through gaps in the density field, light accumulates—creating god rays.`,
code:`float shaft(vec3 p, vec3 sunDir) {
  float occlusion = 0.0;
  for (float s = 0.0; s < 5.0; s += 0.2) {
    vec3 q = p + sunDir * s;
    occlusion += max(0.0, cloudDensity(q)) * 0.2;
  }
  return exp(-occlusion);
}`},
{id:'rainbow',title:'Rainbow Arc',
note:`A rainbow is a cone of refracted light at 42° from the anti-solar point. The SDF is a thick arc at that specific angle, with color varying by sub-angle to spread the spectrum.`,
code:`vec3 rainbow(vec2 p, vec2 center) {
  float r = length(p - center);
  float angle = 0.733;  // 42 degrees
  float d = abs(r - angle) - 0.03;
  float hueVal = (r - angle + 0.03) / 0.06;
  return hue(hueVal * 0.8) * smoothstep(0.03, 0.0, abs(d));
}`},
{id:'starfield',title:'Starfield',
note:`Hash the integer grid cell to get star presence and brightness. Add twinkling with sin(time + hash(cell)) for phase variation. Density increases toward the galactic plane with a Gaussian.`,
code:`float star(vec2 p) {
  vec2 cell = floor(p * 50.0);
  float h = hash(cell);
  if (h > 0.97) {
    vec2 center = (cell + 0.5) / 50.0;
    float d = length(p - center) * 50.0;
    float twinkle = sin(h * 100.0 + time * 2.0) * 0.3 + 0.7;
    return exp(-d * d * 2.0) * twinkle;
  }
  return 0.0;
}`},
]},

textile: {
  label:'TEXTILE', thesis:'Fabric is function composition. Every weave is a modular arithmetic.',
  items:[
{id:'woven',title:'Woven Pattern',live:1,
note:`A weave is modular arithmetic: thread (i,j) goes over or under depending on (i+j)%2. Offset each thread's y-position by a sine wave that alternates phase between rows, and you get the characteristic over-under structure from pure math.`,
code:`float weave(vec2 p) {
  float warpX = mod(p.x, 0.2) - 0.1;
  float weftY = mod(p.y, 0.2) - 0.1;
  int ix = int(floor(p.x / 0.2));
  int iy = int(floor(p.y / 0.2));
  bool over = ((ix + iy) % 2) == 0;
  float warp = abs(warpX) - 0.04;
  float weft = abs(weftY) - 0.04;
  return over ? min(warp, weft) : max(-warp, weft);
}`,
frame(t){
  for(let py=0;py<H;py++)for(let px=0;px<W;px++){
    const sc=12;
    const x=px/sc+t*0.5,y=py/sc;
    const ix=Math.floor(x),iy=Math.floor(y);
    const fx=x-ix-0.5,fy=y-iy-0.5;

    const weftD=Math.abs(fy)-0.35;

    if(warpD<0&&(over||weftD>0)){
      const shade=0.6+lift+noise2(ix*7,iy*3)*0.1;

    }else if(weftD<0){
      const shade=0.55-lift+noise2(ix*3,iy*7)*0.1;
      setPixel(px,py,shade*100|0,shade*130|0,shade*170|0);
    }else{
      setPixel(px,py,20,18,16);
    }
  }
}},
{id:'moire',title:'Moiré Interference',live:1,
note:`Overlay two grids rotated by a small angle and the aliasing creates large-scale interference fringes. This is pure sampling theory made visible—the moiré pattern IS the beat frequency between two spatial frequencies.`,
code:`float moire(vec2 p, float angle1, float angle2) {
  vec2 r1 = rot2(p, angle1);
  vec2 r2 = rot2(p, angle2);
  float g1 = sin(r1.x * 30.0) * 0.5 + 0.5;
  float g2 = sin(r2.x * 30.0) * 0.5 + 0.5;
  return g1 * g2;
}`,
frame(t){

{id:'chainmail',title:'Chainmail',live:1,
note:`Interlocked tori: place a torus at each grid point, alternating the axis of revolution between x and z. Each ring passes through its neighbors—the geometry is pure SDF repetition with axis swapping.`,
code:`float chainmail(vec3 p) {

  int ix = int(floor(p.x));
  int iz = int(floor(p.z));
  if ((ix + iz) % 2 == 0)
    return sdTorus(q, 0.35, 0.05);
  else

    return[(l*210+spec*200)|0,(l*185+spec*160)|0,(l*120+spec*80)|0];

}},
{id:'knit',title:'Knit Stitch',
note:`A knit stitch is two interlocking loops. Model each loop as an SDF of a curved segment, repeat in a brick pattern (offset every other row by half a stitch width).`,
code:`float knit(vec2 p) {
  float row = floor(p.y / 0.3);
  p.x += mod(row, 2.0) * 0.15;
  vec2 q = mod(p, vec2(0.3)) - 0.15;
  float loop = sdArc(q, 0.12, 0.03);
  return loop;
}`},
{id:'rope',title:'Rope Twist',
note:`Three strands helically wound: each strand is a cylinder SDF whose center follows a helix. The twist rate determines how tight the rope is. Union of three phase-shifted helices.`,
code:`float rope(vec3 p, float twist) {
  float d = 1e10;
  for (int i = 0; i < 3; i++) {
    float phase = float(i) * 2.094;
    float cx = cos(p.y * twist + phase) * 0.3;
    float cz = sin(p.y * twist + phase) * 0.3;
    d = min(d, length(p.xz - vec2(cx, cz)) - 0.1);
  }
  return d;
}`},
{id:'lace',title:'Lace Pattern',
note:`Lace is Voronoi cells with holes: compute the Voronoi distance, subtract circular holes at cell centers, and keep only the edge network. The result is a delicate mesh of threads.`,
code:`float lace(vec2 p) {
  float edge = voronoiEdge(p * 5.0);
  float hole = length(fract(p * 5.0) - 0.5) - 0.3;
  return max(edge - 0.05, -hole);
}`},
{id:'braid',title:'Braid Weave',
note:`Three interleaving strands whose crossing order follows the braid group relations. Each strand is a sine-displaced horizontal line, with occlusion determined by the braid word sequence.`,
code:`float braid(vec2 p, float t) {
  float d = 1e10;
  for (int i = 0; i < 3; i++) {
    float phase = float(i) * 2.094 + t;
    float y = sin(p.x * 3.0 + phase) * 0.3;
    d = min(d, abs(p.y - y) - 0.05);
  }
  return d;
}`},
]},

typography: {

{id:'sdf_glow',title:'SDF Text Glow',live:1,
note:`Render text as a signed distance field and apply exponential falloff: glow = exp(-d·k). The SDF stores distance-to-edge for every pixel, enabling resolution-independent rendering and effects like outlines, shadows, and glow from a single distance lookup.`,
code:`float textGlow(vec2 p, float sdf) {
  float edge = smoothstep(0.01, 0.0, sdf);
  float glow = exp(-max(0.0, sdf) * 8.0);
  return edge + glow * 0.5;
}`,
frame(t){
  function letterSDF(px2,py2,letter){
    let d=999;
    const segs={
      S:[[0,.4,.4,.4],[0,.4,0,0],[0,0,.4,0],[.4,0,.4,-.4],[0,-.4,.4,-.4]],
      D:[[0,.4,0,-.4],[0,.4,.3,.3],[.3,.3,.35,0],[.3,-.3,.35,0],[0,-.4,.3,-.3]],
      F:[[0,.4,0,-.4],[0,.4,.4,.4],[0,0,.3,0]],
    };
    const s=segs[letter]||[];
    for(const[ax,ay,bx,by]of s)d=Math.min(d,sdSegment(px2,py2,ax,ay,bx,by));

{id:'neon',title:'Neon Sign',live:1,
note:`Neon is an SDF outline with bloom. Compute the distance to the letter shape, then light up a thin band at d ≈ thickness with bright color, plus exponential glow falloff around it. The tube cross-section is literally a 1D SDF.`,
code:`vec3 neon(float sdf, vec3 color) {
  float tube = smoothstep(0.06, 0.04, abs(sdf));
  float glow = exp(-abs(sdf) * 5.0) * 0.6;
  float flicker = 0.9 + sin(time * 20.0) * 0.1;
  return (tube + glow) * color * flicker;
}`,
frame(t){
  function shapeSDF(x,y){
    let d=999;

{id:'liquid_text',title:'Liquid Text',live:1,
note:`Animate the SDF with smooth-union distortion: add blob SDFs that orbit the letter shapes, pulling the text boundary toward them. The distance field stretches and merges like liquid mercury.`,
code:`float liquidText(vec2 p, float t) {
  float text = textSDF(p);
  for (int i = 0; i < 3; i++) {
    float a = t + float(i) * 2.094;
    vec2 blob = vec2(cos(a) * 0.5, sin(a) * 0.3);

  function baseSDF(x,y){
    let d=999;
    d=Math.min(d,sdSegment(x,y,-0.8,.4,-0.8,-.4));d=Math.min(d,sdSegment(x,y,-0.8,.4,-0.4,.4));

{id:'kerning',title:'Kerning Field',
note:`The space between letters is also an SDF. Kerning is adjusting the gap SDF to achieve optical evenness—measured by the area between the right edge of one glyph and the left edge of the next.`,
code:`float kernGap(vec2 p, float sdfLeft, float sdfRight) {
  return max(sdfLeft, -sdfRight);
  // Area of this region determines visual spacing
}`},
{id:'bezier_outline',title:'Bezier Outline',
note:`Font outlines are cubic Bezier splines. The SDF to a Bezier curve requires solving a quintic equation, but piecewise linear approximation with 8-16 segments gives sub-pixel accuracy.`,
code:`float sdBezier(vec2 p, vec2 a, vec2 b, vec2 c) {
  vec2 ab = b - a, ac = c - a, ap = p - a;
  float d = dot(ab, ab);
  float t = clamp(dot(ap, ab) / d, 0.0, 1.0);
  vec2 q = a + ab * t - p;
  return length(q);
}`},
{id:'halftone',title:'Halftone Fill',
note:`Replace continuous tone with dots whose size varies with brightness. At each grid cell, the dot radius = sqrt(1 - luminance). This is how newspapers print photos—geometry encoding continuous values.`,
code:`float halftone(vec2 p, float lum) {
  vec2 cell = fract(p * 20.0) - 0.5;
  float dotR = sqrt(1.0 - lum) * 0.4;
  return length(cell) - dotR;
}`},

{id:'boids',title:'Flocking Boids',live:1,
note:`Three simple rules—separation, alignment, cohesion—applied to each agent produce emergent flocking behavior. No choreography, no keyframes—just local interactions creating global swarm geometry. Craig Reynolds' 1987 algorithm still powers movie crowds.`,
code:`void boid_update(Boid* b, Boid* flock, int n) {
  vec2 sep = vec2(0), ali = vec2(0), coh = vec2(0);
  int count = 0;
  for (int i = 0; i < n; i++) {
    float d = distance(b->pos, flock[i].pos);
    if (d > 0.0 && d < RADIUS) {
      sep += normalize(b->pos - flock[i].pos) / d;
      ali += flock[i].vel;
      coh += flock[i].pos;
      count++;
    }
  }
  if (count > 0) {
    b->vel += sep * 1.5 + normalize(ali/count) * 1.0
            + normalize(coh/count - b->pos) * 1.0;
  }
}`,

note:`Density advected by curl noise creates smoke without solving Navier-Stokes. At each pixel, trace backward along the velocity field to find where the density came from, then accumulate. Add buoyancy (upward bias) for rising smoke.`,

{id:'firefly',title:'Firefly Swarm',
note:`Each firefly carries a phase oscillator that syncs with nearby neighbors via Kuramoto coupling. The emergent synchronization—all blinking together—is geometry in time, not space.`,
code:`void firefly(Fly* f, Fly* swarm, int n) {
  f->phase += f->freq * dt;
  for (int i = 0; i < n; i++) {
    float d = distance(f->pos, swarm[i].pos);
    if (d < RADIUS)
      f->phase += coupling * sin(swarm[i].phase - f->phase) * dt;
  }

code:`void dust(Particle* p, float dt) {

{id:'ecg',title:'Heartbeat ECG',live:1,
note:`The QRS complex is a parametric waveform: a sharp spike (R wave) flanked by smaller bumps (P, Q, S, T waves). Each is a Gaussian pulse at specific timing offsets. The entire heartbeat is five function calls.`,
code:`float ecg(float t) {
  t = mod(t, 1.0);  // one beat period
  float p = 0.1 * exp(-pow((t - 0.1) / 0.03, 2.0));
  float q = -0.05 * exp(-pow((t - 0.2) / 0.01, 2.0));
  float r = 1.0 * exp(-pow((t - 0.22) / 0.008, 2.0));
  float s = -0.1 * exp(-pow((t - 0.25) / 0.012, 2.0));
  float tt = 0.15 * exp(-pow((t - 0.4) / 0.04, 2.0));
  return p + q + r + s + tt;
}`,

  // ECG trace
  let prevY=-1;
  for(let x=0;x<W;x++){
    const phase=((x/W*2-t*0.8)%1+1)%1;
    const p=0.1*Math.exp(-(((phase-0.1)/0.035)**2));
    const q=-0.08*Math.exp(-(((phase-0.2)/0.012)**2));
    const r=1.0*Math.exp(-(((phase-0.22)/0.009)**2));
    const s=-0.12*Math.exp(-(((phase-0.25)/0.014)**2));
    const tt=0.18*Math.exp(-(((phase-0.4)/0.045)**2));
    const v=p+q+r+s+tt;
    const cy=(H*0.5-v*H*0.35)|0;
    if(prevY>=0){

      }
    }
    prevY=cy;

  const pX=(0.1*W+beatX)%W|0;

{id:'molecular',title:'Molecular Surface',live:1,
note:`A molecule's solvent-accessible surface is the smooth union of spheres centered on each atom, with radii equal to van der Waals radii plus probe radius. Gaussian blobs in an SDF—same math as metaballs, different domain.`,
code:`float molecule(vec3 p) {

code:`// If sample_rate < 2 * max_freq, aliasing occurs

code:`float envelope(float* signal, int pos) {

manufacturing: {
  label:'MFG', thesis:'Toolpaths are Minkowski sums. Tolerance is offset SDF.',
  items:[
{id:'cnc',title:'CNC Toolpath',live:1,
note:`A CNC tool cutting a profile is a Minkowski sum: the tool SDF swept along the path. The offset contour at distance r (tool radius) from the target shape defines the center path. SDF dilation/erosion IS toolpath planning.`,
code:`float toolpath(vec2 p, float toolR) {
  float part = partSDF(p);
  // Tool center must stay outside part + radius
  float offset = part - toolR;
  // Toolpath follows the offset = 0 contour
  return abs(offset) - 0.02;  // visualize path
}`,
frame(t){
  for(let py=0;py<H;py++)for(let px=0;px<W;px++){
    const x=(px/W-0.5)*4,y=(py/H-0.5)*2.5;
    // Part shape: star
    const a=Math.atan2(y,x);
    const r=Math.sqrt(x*x+y*y);
    const star=r-(0.6+Math.sin(a*5+1)*0.15+Math.sin(a*3)*0.1);
    // Tool offsets
    const toolR=0.15;
    const offset1=star-toolR;
    const offset2=star-toolR*2;
    const offset3=star-toolR*3;
    // Animate tool position along offset path
    const toolAngle=t*1.5;
    const toolDist=0.6+toolR+Math.sin(toolAngle*5+1)*0.15+Math.sin(toolAngle*3)*0.1;
    const toolX=Math.cos(toolAngle)*toolDist;
    const toolY=Math.sin(toolAngle)*toolDist;
    const toolD=Math.sqrt((x-toolX)**2+(y-toolY)**2)-toolR;
    if(star<0){setPixel(px,py,60,80,100);}
    else if(toolD<0){setPixel(px,py,180,180,190);}
    else{
      const p1=Math.exp(-Math.abs(offset1)*20)*0.6;
      const p2=Math.exp(-Math.abs(offset2)*20)*0.4;
      const p3=Math.exp(-Math.abs(offset3)*20)*0.3;
      const v=p1+p2+p3;
      setPixel(px,py,v*200+15|0,v*120+14|0,v*50+12|0);
    }
  }
}},
{id:'slicing',title:'3D Print Slicing',live:1,
note:`Slice a 3D SDF at varying z-heights to generate print layers. Each layer is the 2D cross-section where SDF(x,y,z_slice) = 0. Animate z from bottom to top and you watch the print grow—layer by layer from one distance function.`,
code:`float slice(vec2 p, float z, float (*sdf)(vec3)) {
  return sdf(vec3(p, z));
  // Negative = inside = print material
  // Positive = outside = empty
}`,
frame(t){
  const zSlice=Math.sin(t*0.5)*0.5;
  for(let py=0;py<H;py++)for(let px=0;px<W;px++){
    const x=(px/W-0.5)*3,y=(py/H-0.5)*3;
    const z=zSlice;
    // Object: smooth union of box and sphere
    const box=sdBox3(x,y,z,0.5,0.8,0.5);
    const sphere=sdSphere(x-0.3,y+0.5,z,0.5);
    const d=opSmoothUnion(box,sphere,0.3);
    // Torus handle
    const handle=sdTorus(x,y-0.6,z,0.6,0.1);
    const shape=opSmoothUnion(d,handle,0.15);
    if(shape<0){
      const infill=Math.sin(x*30)*Math.sin(y*30)>0?0.8:0.6;
      const edge=Math.abs(shape)<0.05?1:infill;
      setPixel(px,py,edge*180|0,edge*120+40|0,edge*60+30|0);
    }else{
      const contour=Math.exp(-shape*8)*0.3;
      setPixel(px,py,contour*100+15|0,contour*80+14|0,contour*60+12|0);
    }
  }
}},
{id:'kerf',title:'Laser Kerf',live:1,
note:`Laser cutting removes material of width k (the kerf). The cut part SDF must be offset inward by k/2, and the waste outward by k/2. Visualize both offset SDFs to see the material removed—it's pure SDF dilation and erosion.`,
code:`float kerf(vec2 p, float k) {
  float part = partSDF(p);
  float inner = part + k * 0.5;  // eroded part
  float outer = part - k * 0.5;  // dilated cut
  // Material removed: max(-outer, inner)
  float removed = max(-outer, inner);
  return removed;
}`,
frame(t){
  for(let py=0;py<H;py++)for(let px=0;px<W;px++){
    const x=(px/W-0.5)*3.5,y=(py/H-0.5)*2.2;
    // Shape: rounded rectangle with holes
    let shape=sdBox2(x,y,1.0,0.5)-0.1;
    shape=Math.max(shape,-sdCircle(x-0.4,y,0.15));
    shape=Math.max(shape,-sdCircle(x+0.4,y,0.15));
    shape=Math.max(shape,-sdBox2(x,y-0.2,0.15,0.25));
    const k=0.04+Math.sin(t)*0.02;
    const inner=shape+k*0.5;
    const outer=shape-k*0.5;
    if(inner<0){setPixel(px,py,80,120,160);} // part
    else if(outer<0){
      const heat=Math.sin(t*10+px*0.5)*0.3+0.7;
      setPixel(px,py,255*heat|0,120*heat|0,30|0);
    } // kerf (laser)
    else{
      const grid=(Math.floor(x*10)+Math.floor(y*10))&1?0.15:0.12;
      setPixel(px,py,grid*200|0,grid*180|0,grid*160|0);
    }
  }
}},
{id:'mold_flow',title:'Injection Mold Flow',
note:`Plastic flow in a mold follows the Hele-Shaw equation. The flow front is an expanding SDF from the gate, modified by local thickness. Thin sections fill last—the geometry determines the process.`,
code:`float flowFront(vec2 p, vec2 gate, float time) {
  float dist = length(p - gate);
  float thickness = moldThickness(p);
  float speed = thickness * thickness;  // Hele-Shaw
  return dist / speed - time;
}`},
{id:'tolerance',title:'Tolerance Stack',
note:`A tolerance zone is the region between two offset SDFs: part_SDF + tol_low and part_SDF + tol_high. The part is in-spec when its SDF falls between these bounds everywhere. Tolerance analysis IS SDF arithmetic.`,
code:`bool inTolerance(vec2 p, float tol_lo, float tol_hi) {
  float d = partSDF(p);
  return d >= tol_lo && d <= tol_hi;
}`},
{id:'drill',title:'Drill Pattern',
note:`Bolt hole patterns are circles placed at regular angular intervals on a bolt circle diameter. The SDF is the union of all hole SDFs—pure polar repetition like gear teeth, but subtractive.`,
code:`float drillPattern(vec2 p, float bcd, int nHoles, float holeR) {
  float d = 1e10;
  for (int i = 0; i < nHoles; i++) {
    float a = float(i) / float(nHoles) * 6.28;
    vec2 c = vec2(cos(a), sin(a)) * bcd * 0.5;
    d = min(d, length(p - c) - holeR);
  }
  return d;
}`},
]},
