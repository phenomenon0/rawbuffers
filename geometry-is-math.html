cosmological: {
  label:'COSMO', thesis:'The universe is a density field. Structure is gravitational noise.',
  items:[
{id:'galaxy_spiral',title:'Galaxy Spiral',live:1,
note:`A logarithmic spiral r = a·e^(bθ) defines galaxy arm structure. The density falls off perpendicular to each arm as a Gaussian, and radially as an exponential disk. Two equations create a recognizable galaxy from any distance.`,
code:`float galaxy(vec2 p, float arms, float twist) {
  float r = length(p);
  float angle = atan(p.y, p.x);
  float arm_angle = angle - log(r + 0.1) * twist;
  arm_angle = mod(arm_angle + 3.14, 6.28 / arms) - 3.14 / arms;
  float arm_dist = abs(arm_angle) * r;
  float density = exp(-arm_dist * arm_dist * 2.0) * exp(-r * 0.5);
  return density;
}`,
frame(t){
  for(let py=0;py<H;py++)for(let px=0;px<W;px++){
    const x=(px-W/2)/60,y=(py-H/2)/60;
    const r=Math.sqrt(x*x+y*y);
    let a=Math.atan2(y,x)+t*0.1;
    const arms=3,twist=2.5;
    const armA=a-Math.log(r+0.1)*twist;
    const armMod=((armA%(6.28/arms))+(6.28/arms))%(6.28/arms)-Math.PI/arms;
    const armDist=Math.abs(armMod)*r;
    const density=Math.exp(-armDist*armDist*3)*Math.exp(-r*0.3);
    const core=Math.exp(-r*r*2)*0.8;
    const v=density+core;
    const dust=noise2(x*3+t*0.1,y*3)*0.1*Math.exp(-r*0.5);
    const star=ihash(px,py)>0.995?Math.random()*0.5:0;
    setPixel(px,py,
      clamp(v*200+dust*100+star*200+8,0,255)|0,
      clamp(v*160+dust*150+star*180+8,0,255)|0,
      clamp(v*220+dust*200+star*150+15,0,255)|0);
  }
}},
{id:'lensing',title:'Gravitational Lensing',live:1,
note:`A massive object bends spacetime, deflecting light by α = 4GM/(c²b) where b is the impact parameter. For rendering: each pixel traces back through the deflection field to find what background it sees. The Einstein ring emerges at exactly the right angle.`,
code:`vec2 deflect(vec2 p, vec2 lens, float einsteinR) {
  vec2 d = p - lens;
  float r = length(d);
  float deflection = einsteinR * einsteinR / max(r, 0.01);
  return p - normalize(d) * deflection;
}`,
frame(t){
  // Background star grid
  const bgW=640,bgH=400;
  if(!this._bg){
    this._bg=new Uint8Array(bgW*bgH*3);
    for(let i=0;i<bgW*bgH;i++){
      const v=ihash(i%bgW,Math.floor(i/bgW))>0.992?Math.random()*200+55:0;
      this._bg[i*3]=v*0.8;this._bg[i*3+1]=v*0.9;this._bg[i*3+2]=v;
    }
    // Add a distant galaxy
    for(let dy=-15;dy<=15;dy++)for(let dx=-25;dx<=25;dx++){
      const gx=bgW/2+80+dx,gy=bgH/2-30+dy;
      const d=Math.sqrt(dx*dx/625+dy*dy/225);
      if(d<1){const v=(1-d)*120;this._bg[(gy*bgW+gx)*3]+=v*0.8;this._bg[(gy*bgW+gx)*3+1]+=v*0.6;this._bg[(gy*bgW+gx)*3+2]+=v;}
    }
  }
  const lx=W/2+Math.sin(t*0.3)*30,ly=H/2+Math.cos(t*0.4)*20;
  const eR=35+Math.sin(t*0.2)*5;
  for(let py=0;py<H;py++)for(let px=0;px<W;px++){
    const dx=px-lx,dy=py-ly;
    const r=Math.sqrt(dx*dx+dy*dy)||0.01;
    const defl=eR*eR/r;
    const sx=(px-dx/r*defl+bgW)%bgW|0;
    const sy=(py-dy/r*defl+bgH)%bgH|0;
    const idx=(sy*bgW+sx)*3;
    const ring=Math.exp(-Math.abs(r-eR)*0.3)*40;
    setPixel(px,py,
      Math.min(255,this._bg[idx]+ring*0.5)|0,
      Math.min(255,this._bg[idx+1]+ring*0.8)|0,
      Math.min(255,this._bg[idx+2]+ring)|0);
  }
}},
{id:'cosmic_web',title:'Cosmic Web',live:1,
note:`The large-scale structure of the universe is a Voronoi foam: matter concentrates along cell edges (filaments) and at vertices (galaxy clusters), with vast voids in cell interiors. Voronoi edge distance IS the cosmic web.`,
code:`float cosmicWeb(vec2 p) {
  float edge = voronoiEdge(p * 2.0);
  float filament = smoothstep(0.15, 0.0, edge);
  float cluster = 0.0;
  for (int dy = -1; dy <= 1; dy++)
  for (int dx = -1; dx <= 1; dx++) {
    vec2 cell = floor(p * 2.0) + vec2(dx, dy);
    vec2 pt = cell + hash2(cell);
    cluster += exp(-length(p * 2.0 - pt) * 5.0);
  }
  return filament * 0.5 + cluster * 0.5;
}`,
frame(t){
  for(let py=0;py<H;py++)for(let px=0;px<W;px++){
    const x=px/H*5+t*0.05,y=py/H*5;
    const edge=voronoiEdge(x,y);
    const filament=smoothstep(0.15,0,edge);
    // Galaxy clusters at cell vertices
    const ix=Math.floor(x),iy=Math.floor(y);
    let cluster=0;
    for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++){
      const cx=ix+dx,cy=iy+dy;
      const px2=cx+ihash(cx,cy),py2=cy+ihash(cx+100,cy+100);
      const d=Math.sqrt((x-px2)**2+(y-py2)**2);
      cluster+=Math.exp(-d*8)*0.5;
    }
    const v=filament*0.4+cluster;
    const star=ihash(px+300,py+300)>0.997?0.3:0;
    setPixel(px,py,
      clamp(v*100+star*150+5,0,255)|0,
      clamp(v*120+star*120+5,0,255)|0,
      clamp(v*200+star*100+12,0,255)|0);
  }
}},
{id:'accretion',title:'Accretion Disk',
note:`Matter spiraling into a black hole forms a disk. The temperature (and thus color) increases inward as T ∝ r^(-3/4). Doppler beaming brightens the approaching side and dims the receding side.`,
code:`vec3 accretion(vec2 p) {
  float r = length(p);
  float temp = pow(r, -0.75);
  float doppler = 1.0 + 0.3 * p.x / r;  // approaching side
  return blackbody(temp * doppler) * smoothstep(0.5, 1.0, r);
}`},
{id:'nebula',title:'Nebula Cloud',
note:`A nebula is 3D noise sampled in emission and absorption. Different elements (Hα, OIII, SII) emit at specific wavelengths, so color-code multiple noise octaves at different frequencies.`,
code:`vec3 nebula(vec3 p) {
  float ha = max(0.0, fbm(p * 1.5, 5) - 0.2);   // hydrogen alpha
  float oiii = max(0.0, fbm(p * 2.0 + 10.0, 4) - 0.3);  // oxygen
  float sii = max(0.0, fbm(p * 1.0 + 20.0, 3) - 0.25);  // sulfur
  return vec3(sii, ha, oiii);  // Hubble palette
}`},
{id:'orbital',title:'Orbital Mechanics',
note:`Kepler orbits are conic sections: e < 1 ellipse, e = 1 parabola, e > 1 hyperbola. The orbit shape r(θ) = a(1-e²)/(1+e·cos(θ)) is pure geometry—one equation for every orbit from Mercury to interstellar visitors.`,
code:`float orbit(float theta, float a, float e) {
  return a * (1.0 - e*e) / (1.0 + e * cos(theta));
}`},
{id:'cmb',title:'CMB Anisotropy',
note:`The cosmic microwave background is a spherical noise field—temperature fluctuations of 1 part in 100,000 from the Big Bang. It's the oldest image in the universe, and it's a noise map on a sphere.`,
code:`float cmb(vec2 uv) {
  // Spherical harmonics decomposition
  float T = 2.725;  // mean temperature in Kelvin
  float dT = fbm(uv * 20.0, 6) * 0.0001;  // ~100 µK
  return T + dT;
}`},
]},

}; // end CATEGORIES

// ═══════════════════════════════════════════════════════════════
//  ENGINE
// ═══════════════════════════════════════════════════════════════

const $fps = document.getElementById('fps');
const $thesis = document.getElementById('thesis');
const $pills = document.getElementById('pills');
const $title = document.getElementById('itemTitle');
const $note = document.getElementById('itemNote');
const $code = document.getElementById('codeView');
const $tabs = document.getElementById('catTabs');
const $pause = document.getElementById('pauseBtn');
const $cTabBtn = document.getElementById('cTabBtn');
const $jsTabBtn = document.getElementById('jsTabBtn');
const $runBtn = document.getElementById('runBtn');
const $resetCodeBtn = document.getElementById('resetCodeBtn');
const $runError = document.getElementById('runError');
const $codeBodyC = document.getElementById('codeBodyC');
const $codeBodyJS = document.getElementById('codeBodyJS');
const $jsEditor = document.getElementById('jsEditor');
let activeCodeTab = 'c';

$pause.onclick = () => { paused = !paused; $pause.textContent = paused ? 'Play' : 'Pause'; };

function switchCodeTab(tab) {
  activeCodeTab = tab;
  $cTabBtn.classList.toggle('active', tab === 'c');
  $jsTabBtn.classList.toggle('active', tab === 'js');
  $codeBodyC.style.display = tab === 'c' ? '' : 'none';
  $codeBodyJS.style.display = tab === 'js' ? '' : 'none';
  $runBtn.style.display = tab === 'js' ? '' : 'none';
  $resetCodeBtn.style.display = tab === 'js' ? '' : 'none';
}

function runCode() {
  try {
    let src = $jsEditor.value.trim();
    // Method shorthand "frame(t){...}" -> "function(t){...}"
    if (/^[a-zA-Z_]\w*\s*\(/.test(src) && !src.startsWith('function')) {
      src = 'function ' + src.replace(/^[a-zA-Z_]\w*/, '');
    }
    const fn = eval('(' + src + ')');
    if (typeof fn !== 'function') throw new Error('Not a function');
    currentItem.frame = fn;
    $runError.style.color = 'var(--green)';
    $runError.textContent = 'OK';
    setTimeout(() => { $runError.textContent = ''; }, 1500);
  } catch (e) {
    $runError.style.color = 'var(--red)';
    $runError.textContent = e.message;
  }
}

function resetCode() {
  if (currentItem && currentItem._origFrame) {
    currentItem.frame = currentItem._origFrame;
    $jsEditor.value = currentItem._origFrame.toString();
    $runError.textContent = '';
  }
}

$cTabBtn.onclick = () => switchCodeTab('c');
$jsTabBtn.onclick = () => switchCodeTab('js');
$runBtn.onclick = runCode;
$resetCodeBtn.onclick = resetCode;
$jsEditor.addEventListener('keydown', e => {
  if (e.ctrlKey && e.key === 'Enter') { e.preventDefault(); runCode(); }
});

// Build tabs
const catKeys = Object.keys(CATEGORIES);
catKeys.forEach(key => {
  const cat = CATEGORIES[key];
  if (!cat.items.length) return; // skip empty placeholder categories
  const btn = document.createElement('button');
  btn.className = 'tab';
  btn.textContent = cat.label;
  btn.onclick = () => switchCat(key);
  btn.dataset.cat = key;
  $tabs.appendChild(btn);
});

function switchCat(id) {
  currentCat = id;
  const cat = CATEGORIES[id];

  // Tab active state
  $tabs.querySelectorAll('.tab').forEach(t => {
    t.className = t.dataset.cat === id ? 'tab active' : 'tab';
  });

  $thesis.textContent = cat.thesis;

  // Build pills
  $pills.innerHTML = '';
  cat.items.forEach(item => {
    const pill = document.createElement('button');
    pill.className = 'pill';
    pill.innerHTML = (item.live ? '<span class="dot"></span>' : '') + item.title;
    pill.onclick = () => selectItem(id, item);
    pill.dataset.id = item.id;
    $pills.appendChild(pill);
  });

  // Select first live item or first item
  const first = cat.items.find(i => i.live) || cat.items[0];
  if (first) selectItem(id, first);
}

function selectItem(catId, item) {
  if (currentItem && currentItem._state) currentItem._state = null;
  currentItem = item;

  // Pill active state
  $pills.querySelectorAll('.pill').forEach(p => {
    p.className = p.dataset.id === item.id ? 'pill active' : 'pill';
  });

  $title.textContent = item.title;
  $note.textContent = item.note || '';
  $code.innerHTML = highlight(item.code || '');

  // Store original frame for revert
  if (item.frame && !item._origFrame) item._origFrame = item.frame;
  // Populate JS editor with clean function source
  if (item.frame) {
    let src = item.frame.toString();
    // Convert method shorthand to function expression for eval compatibility
    if (/^[a-zA-Z_]\w*\s*\(/.test(src) && !src.startsWith('function')) {
      src = 'function ' + src.replace(/^[a-zA-Z_]\w*/, '');
    }
    $jsEditor.value = src;
  } else {
    $jsEditor.value = '// No live frame function for this item';
  }
  $runError.textContent = '';
  switchCodeTab(activeCodeTab);

  history.replaceState(null, '', '#' + catId + '/' + item.id);
  mouseX = 0; mouseY = -0.3;
}

// Animation loop
function loop(ts) {
  if (!paused && currentItem) {
    const t = (ts - startTime) / 1000;
    if (currentItem.live && currentItem.frame) {
      currentItem.frame(t);
    } else {
      renderPlaceholder();
    }
    ctx.putImageData(imageData, 0, 0);
  }
  frameCount++;
  if (ts - lastFpsTime > 1000) {
    $fps.textContent = frameCount + ' FPS';
    frameCount = 0; lastFpsTime = ts;
  }
  requestAnimationFrame(loop);
}

// Mouse interaction (orbit for 3D demos)
canvas.addEventListener('mousedown', () => dragging = true);
canvas.addEventListener('mouseup', () => dragging = false);
canvas.addEventListener('mouseleave', () => dragging = false);
canvas.addEventListener('mousemove', e => {
  if (dragging) {
    mouseX += e.movementX * 0.01;
    mouseY = clamp(mouseY + e.movementY * 0.01, -1.2, 0.5);
  }
});

// Touch support
let lastTouch = null;
canvas.addEventListener('touchstart', e => { lastTouch = e.touches[0]; e.preventDefault(); }, {passive:false});
canvas.addEventListener('touchmove', e => {
  if (lastTouch && e.touches[0]) {
    mouseX += (e.touches[0].clientX - lastTouch.clientX) * 0.01;
    mouseY = clamp(mouseY + (e.touches[0].clientY - lastTouch.clientY) * 0.01, -1.2, 0.5);
    lastTouch = e.touches[0];
  }
  e.preventDefault();
}, {passive:false});
canvas.addEventListener('touchend', () => lastTouch = null);

// Keyboard navigation
document.addEventListener('keydown', e => {
  if (!currentCat) return;
  // Don't hijack arrows when editing JS
  if (document.activeElement === $jsEditor) return;
  const cat = CATEGORIES[currentCat];
  if (e.key === 'ArrowRight' || e.key === 'ArrowLeft') {
    const idx = cat.items.indexOf(currentItem);
    const next = e.key === 'ArrowRight' ? (idx+1) % cat.items.length : (idx-1+cat.items.length) % cat.items.length;
    selectItem(currentCat, cat.items[next]);
    e.preventDefault();
  }
  // Number keys switch categories
  const num = parseInt(e.key);
  if (num >= 1 && num <= 9) {
    const visibleCats = catKeys.filter(k => CATEGORIES[k].items.length > 0);
    if (num <= visibleCats.length) switchCat(visibleCats[num-1]);
  }
});

// Canvas resize
function resizeCanvas() {
  const wrap = document.querySelector('.canvas-wrap');
  const ww = wrap.clientWidth, wh = wrap.clientHeight;
  const scale = Math.min(ww / W, wh / H, 3);
  canvas.style.width = (W * scale) + 'px';
  canvas.style.height = (H * scale) + 'px';
}
window.addEventListener('resize', resizeCanvas);

// Init from hash or default
function init() {
  const hash = location.hash.slice(1);
  const visibleCats = catKeys.filter(k => CATEGORIES[k].items.length > 0);
  if (hash) {
    const [cat, itemId] = hash.split('/');
    if (CATEGORIES[cat] && CATEGORIES[cat].items.length) {
      switchCat(cat);
      if (itemId) {
        const item = CATEGORIES[cat].items.find(i => i.id === itemId);
        if (item) selectItem(cat, item);
      }
      resizeCanvas();
      requestAnimationFrame(loop);
      return;
    }
  }
  if (visibleCats.length) switchCat(visibleCats[0]);
  resizeCanvas();
  requestAnimationFrame(loop);
}

init();
</script>
</body>
